<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pong</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
      overflow: hidden;
      text-shadow: 0 1px 6px rgba(0,0,0,1), 0 0 12px rgba(0,0,0,0.9);
    }
    #scoreboard {
      display: flex;
      align-items: center;
      width: 804px;
      height: 72px;
      flex-shrink: 0;
      font-size: 48px;
      font-weight: bold;
      letter-spacing: 4px;
      line-height: 1;
    }
    #score-player { flex: 1; text-align: center; }
    #score-ai     { flex: 1; text-align: center; }
    #label-row {
      display: flex;
      width: 804px;
      height: 30px;
      flex-shrink: 0;
      align-items: flex-start;
      font-size: 18px;
      letter-spacing: 2px;
      color: #ddd;
      text-shadow: 0 1px 6px rgba(0,0,0,1), 0 0 12px rgba(0,0,0,0.9);
      line-height: 1;
    }
    #label-player { flex: 1; text-align: center; white-space: nowrap; }
    #label-spacer  { flex: 1; }
    #label-ai     { flex: 1; text-align: center; white-space: nowrap; }
    #frenzy-row {
      display: flex;
      width: 804px;
      height: 32px;
      flex-shrink: 0;
      align-items: center;
      overflow: hidden;
      position: relative; z-index: 3;
    }
    #frenzy-left, #frenzy-right {
      flex: 1;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 1px;
      text-align: center;
      visibility: hidden;
    }
    @keyframes kenBurns {
      from { transform: scale(1.0); }
      to   { transform: scale(1.1); }
    }
    @keyframes rainbowCycle {
      0%   { color: #ff0000; }
      14%  { color: #ff7f00; }
      28%  { color: #ffff00; }
      42%  { color: #00ff00; }
      57%  { color: #0000ff; }
      71%  { color: #4b0082; }
      85%  { color: #9400d3; }
      100% { color: #ff0000; }
    }
    .rainbow-text {
      animation: rainbowCycle 2s linear infinite;
      font-weight: bold;
      font-size: 28px;
      letter-spacing: 2px;
      display: block;
    }
    .bg-layer {
      position: fixed; inset: 0;
      background-size: 100% 100%; background-position: center; background-repeat: no-repeat;
      transition: opacity 3s ease;
      z-index: 1; pointer-events: none; opacity: 0;
      transform-origin: center center;
      will-change: transform, opacity;
    }
    #frenzy-overlay {
      position: fixed; inset: 0;
      z-index: 2; pointer-events: none; opacity: 0;
    }
    #scoreboard, #label-row, #canvas-wrapper, #controls, #keys-help, #now-playing-label {
      position: relative; z-index: 3;
    }
    #canvas-wrapper { width: 804px; height: 504px; flex-shrink: 0; }
    #scrawl-canvas  { position: absolute; top: -14px; left: -14px; pointer-events: none; z-index: 4; }
    canvas { border: 2px solid #555; cursor: none; }
    #now-playing-center {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    #frenzy-countdown {
      font-size: 20px; font-weight: bold; color: #ff4; letter-spacing: 3px;
      visibility: hidden;
      white-space: nowrap;
      text-shadow: 0 1px 6px rgba(0,0,0,1), 0 0 12px rgba(0,0,0,0.9);
    }
    #now-playing-label {
      font-size: 16px; color: #ccc; letter-spacing: 2px;
      text-align: center; text-transform: uppercase;
      text-shadow: 0 1px 6px rgba(0,0,0,1), 0 0 12px rgba(0,0,0,0.9);
    }
    #now-playing {
      font-size: 34px; color: #ddd; letter-spacing: 1px;
      text-align: center; font-family: 'Fredoka One', cursive;
      text-shadow: 0 1px 6px rgba(0,0,0,1), 0 0 12px rgba(0,0,0,0.9);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #now-playing::before { content: '♪ '; }
    #now-playing::after  { content: ' ♪'; }
    .label { color: #aaa; font-size: 11px; letter-spacing: 1px; }
    #keys-help {
      margin-top: 30px; font-size: 15px; color: #bbb; letter-spacing: 1px;
      background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="bg-a" class="bg-layer"></div>
  <div id="bg-b" class="bg-layer"></div>
  <div id="frenzy-overlay"></div>
  <div id="scoreboard">
    <span id="score-player">0</span>
    <div id="now-playing-center">
      <div id="frenzy-countdown"></div>
      <div id="now-playing-label">Now Playing:</div>
      <div id="now-playing">♪ — ♪</div>
    </div>
    <span id="score-ai">0</span>
  </div>
  <div id="label-row">
    <span id="label-player">YOU</span>
    <div id="label-spacer"></div>
    <span id="label-ai">CPU</span>
  </div>
  <div id="frenzy-row">
    <div id="frenzy-left"></div>
    <div id="frenzy-right"></div>
  </div>
  <div id="canvas-wrapper">
    <canvas id="c"></canvas>
    <canvas id="scrawl-canvas" width="832" height="532"></canvas>
  </div>
  <div id="keys-help">SHIELD: ← or 4 &nbsp;|&nbsp; SHOOT: → or 6 &nbsp;|&nbsp; PAUSE: Space Bar &nbsp;|&nbsp; MUTE: 5 &nbsp;|&nbsp; SLOWER: - &nbsp;|&nbsp; FASTER: +</div>

  <script>
    // ─── Background images (NASA APOD) ───────────────────────────────────────
    const APOD_API_KEY = 'Fek6QhTkzvPLLA22pXlm1mJh5IRQTMq0ZwOsfzZN';
    const APOD_COUNT   = 15;
    const BG_CYCLE_MS  = 30000;

    let bgImages = [];
    let bgMeta   = []; // { title, copyright } — stored for future use
    let bgIndex  = 0;
    let bgCycleInterval = null;

    const bgA = document.getElementById('bg-a');
    const bgB = document.getElementById('bg-b');
    const frenzyOverlay = document.getElementById('frenzy-overlay');
    let activeBg = bgA; // currently visible layer

    function applyNextBackground() {} // no-op stub — resetGame calls this safely

    function restartZoom(el) {
      el.style.animation = 'none';
      el.offsetHeight; // force reflow so the browser resets the animation
      el.style.animation = 'kenBurns 20s linear forwards';
    }

    function crossfadeTo(url) {
      const incoming = activeBg === bgA ? bgB : bgA;
      incoming.style.backgroundImage = `url('${url}')`;
      restartZoom(incoming);
      incoming.style.opacity = '1';
      activeBg.style.opacity = '0';
      activeBg = incoming;
    }

    function startBgCycle() {
      if (bgCycleInterval) clearInterval(bgCycleInterval);
      bgIndex = Math.floor(Math.random() * bgImages.length);
      activeBg = bgA;
      bgB.style.opacity = '0';
      bgA.style.backgroundImage = `url('${bgImages[bgIndex]}')`;
      restartZoom(bgA);
      bgA.style.opacity = '1';
      bgCycleInterval = setInterval(() => {
        bgIndex = (bgIndex + 1) % bgImages.length;
        crossfadeTo(bgImages[bgIndex]);
      }, BG_CYCLE_MS);
    }

    const LOCAL_BG_COUNT = 105; // update if you add or remove images
    const APOD_ENABLED   = false; // ← set to true to re-enable NASA API backgrounds

    // Build the full list, shuffle it, and start immediately — no sequential probing.
    // Change LOCAL_BG_COUNT above if the number of background files changes.
    function loadLocalImages() {
      const candidates = Array.from({ length: LOCAL_BG_COUNT },
                                    (_, i) => `backgrounds/background_${i + 1}.jpg`);
      let remaining = candidates.length;
      const loaded = [];
      candidates.forEach(url => {
        const img = new Image();
        img.onload  = () => { loaded.push(url); finalize(); };
        img.onerror = () => {                    finalize(); };
        img.src = url;
      });
      function finalize() {
        if (--remaining > 0) return;
        bgImages = loaded;
        bgMeta   = bgImages.map(() => ({ title: '', copyright: '' }));
        // Fisher-Yates shuffle for random order every session
        for (let i = bgImages.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [bgImages[i], bgImages[j]] = [bgImages[j], bgImages[i]];
          [bgMeta[i],   bgMeta[j]]   = [bgMeta[j],   bgMeta[i]];
        }
        if (bgImages.length) startBgCycle();
      }
    }

    loadLocalImages();

    // Step 2 — fetch NASA APOD in parallel; swap in if successful
    const APOD_URL = `https://api.nasa.gov/planetary/apod?api_key=${APOD_API_KEY}&count=${APOD_COUNT}`;
    if (APOD_ENABLED) console.log('[APOD] Fetching:', APOD_URL);

    if (APOD_ENABLED) fetch(APOD_URL)
      .then(r => {
        console.log('[APOD] HTTP status:', r.status, r.statusText);
        if (!r.ok) {
          return r.text().then(body => { throw new Error(`APOD HTTP ${r.status}: ${body}`); });
        }
        return r.json();
      })
      .then(data => {
        const images = data.filter(e => e.media_type === 'image');
        if (!images.length) throw new Error('APOD batch contained no images');
        bgImages = images.map(e => e.url);
        bgMeta   = images.map(e => ({ title: e.title || '', copyright: e.copyright || '' }));
        console.log('[APOD] Switched to NASA images:', bgImages.length);
        startBgCycle(); // crossfades into first NASA image
      })
      .catch(err => {
        console.error('[APOD] Fetch failed, keeping local images. Reason:', err.message);
        // local images already loaded and cycling — nothing to do
      });

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 800, H = 500;
    canvas.width = W; canvas.height = H;

    const scrawlEl = document.getElementById('scrawl-canvas');
    const sctx = scrawlEl.getContext('2d');
    const SW = 832, SH = 532, SG = 14; // scrawl canvas dims and gutter size

    const PADDLE_W = 12, PADDLE_H = 90, BALL_R = 8;
    const PADDLE_CURVE = 0.35; // spin multiplier based on hit position
    const KEY_PADDLE_SPEED = 11;
    const WIN_SCORE = 99;
    const BULLET_R = 4, BULLET_SPEED = 9;
    const HOLE_SIZE = 14, MAX_HOLES = 5;
    const SHOT_COOLDOWN = 700;
    const AI_SHOT_MIN = 2500, AI_SHOT_MAX = 5000;
    const SHIELD_MAX_MS      = 5000;
    const SHIELD_RECHARGE_MS = 20000;
    const TRAIL_DURATION = 20000;
    const TRAIL_SPEED_MULT = 3, TRAIL_SCORE_MULT = 3;

    // ─── Audio context ────────────────────────────────────────────────────────
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // ─── SFX ─────────────────────────────────────────────────────────────────
    function playPaddleSound() {
      const t = audioCtx.currentTime;
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(450, t);
      o.frequency.exponentialRampToValueAtTime(250, t + 0.15);
      g.gain.setValueAtTime(0.2, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
      o.start(t); o.stop(t + 0.15);
    }

    function playFloorCeilingSound() {
      const t = audioCtx.currentTime;
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'triangle';
      o.frequency.setValueAtTime(200, t);
      o.frequency.exponentialRampToValueAtTime(80, t + 0.12);
      g.gain.setValueAtTime(0.18, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.12);
      o.start(t); o.stop(t + 0.12);
    }

    function playShootSound() {
      const now = audioCtx.currentTime;
      const dur = 0.6;

      // Main descending laser oscillator
      const osc1 = audioCtx.createOscillator();
      osc1.type = 'sawtooth';
      osc1.frequency.setValueAtTime(800, now);
      osc1.frequency.exponentialRampToValueAtTime(40, now + dur);

      // Sub bass layer for depth
      const osc2 = audioCtx.createOscillator();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(400, now);
      osc2.frequency.exponentialRampToValueAtTime(25, now + dur);

      // Metallic shimmer
      const osc3 = audioCtx.createOscillator();
      osc3.type = 'square';
      osc3.frequency.setValueAtTime(1200, now);
      osc3.frequency.exponentialRampToValueAtTime(60, now + dur * 0.8);

      // Lowpass filter sweep for that laser "zap" character
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(3000, now);
      filter.frequency.exponentialRampToValueAtTime(200, now + dur);
      filter.Q.value = 12;

      // Amp envelope
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.5, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, now + dur);

      const sub = audioCtx.createGain();
      sub.gain.value = 0.6;
      const shim = audioCtx.createGain();
      shim.gain.value = 0.15;

      osc1.connect(filter);
      osc3.connect(shim).connect(filter);
      filter.connect(gain);
      osc2.connect(sub).connect(gain);
      gain.connect(audioCtx.destination);

      osc1.start(now); osc2.start(now); osc3.start(now);
      osc1.stop(now + dur); osc2.stop(now + dur); osc3.stop(now + dur);
    }

    // Charging sound: rises from low to high frequency and sustains
    function startChargingSound() {
      if (isChargeSoundPlaying) return;
      isChargeSoundPlaying = true;

      const now = audioCtx.currentTime;

      chargeOscillator = audioCtx.createOscillator();
      chargeOscillator.type = 'sine';
      chargeOscillator.frequency.setValueAtTime(220, now); // A3 - start low
      chargeOscillator.frequency.linearRampToValueAtTime(660, now + 0.8); // rise to E4 over 0.8s

      chargeGain = audioCtx.createGain();
      chargeGain.gain.setValueAtTime(0, now);
      chargeGain.gain.linearRampToValueAtTime(0.25, now + 0.05); // quick attack
      // sustain at 0.25 until stopped

      chargeOscillator.connect(chargeGain);
      chargeGain.connect(audioCtx.destination);
      chargeOscillator.start(now);
    }

    function stopChargingSound() {
      if (!isChargeSoundPlaying) return;
      isChargeSoundPlaying = false;

      if (chargeOscillator && chargeGain) {
        const now = audioCtx.currentTime;
        const fadeDur = 0.15;

        chargeGain.gain.cancelScheduledValues(now);
        chargeGain.gain.setValueAtTime(chargeGain.gain.value, now);
        chargeGain.gain.exponentialRampToValueAtTime(0.001, now + fadeDur);

        setTimeout(() => {
          try {
            chargeOscillator.stop();
          } catch (e) {}
          chargeOscillator = null;
          chargeGain = null;
        }, fadeDur * 1000);
      }
    }

    // Powerful "pew" sound on charge release, intensity scales with charge level
    function playChargeFireSound(chargeLevel = 0) {
      const now = audioCtx.currentTime;
      const baseFreq = 1800;
      const dur = 0.1 + chargeLevel * 0.1; // longer release for higher charge (0.1-0.2s)
      const intensity = 0.25 + chargeLevel * 0.3; // louder for higher charge (0.25-0.55)

      // High frequency sine that drops quickly
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(baseFreq + chargeLevel * 400, now); // higher start freq for higher charge
      osc.frequency.exponentialRampToValueAtTime(200 + chargeLevel * 200, now + dur);

      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(intensity, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + dur);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + dur);
    }

    function playAIShootSound() {
      const now = audioCtx.currentTime;
      const dur = 0.35;

      const osc1 = audioCtx.createOscillator();
      osc1.type = 'sawtooth';
      osc1.frequency.setValueAtTime(1200, now);
      osc1.frequency.exponentialRampToValueAtTime(180, now + dur);

      const osc2 = audioCtx.createOscillator();
      osc2.type = 'square';
      osc2.frequency.setValueAtTime(800, now);
      osc2.frequency.exponentialRampToValueAtTime(120, now + dur);

      const sub = audioCtx.createOscillator();
      sub.type = 'sine';
      sub.frequency.setValueAtTime(400, now);
      sub.frequency.exponentialRampToValueAtTime(80, now + dur);

      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(3000, now);
      filter.frequency.exponentialRampToValueAtTime(400, now + dur);
      filter.Q.value = 8;

      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.35, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, now + dur);

      osc1.connect(filter);
      osc2.connect(filter);
      sub.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);

      osc1.start(now); osc2.start(now); sub.start(now);
      osc1.stop(now + dur); osc2.stop(now + dur); sub.stop(now + dur);
    }

    function playBulletHitSound() {
      const t = audioCtx.currentTime;
      for (let i = 0; i < 3; i++) {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'square';
        o.frequency.setValueAtTime(800 - i * 200, t + i * 0.04);
        g.gain.setValueAtTime(0.12, t + i * 0.04);
        g.gain.exponentialRampToValueAtTime(0.01, t + i * 0.04 + 0.06);
        o.start(t + i * 0.04); o.stop(t + i * 0.04 + 0.06);
      }
    }

    // ─── Shield sound (continuous crackle while active) ──────────────────────
    let shieldSoundNodes = null;

    function startShieldSound() {
      if (shieldSoundNodes) return;
      const bufLen = audioCtx.sampleRate; // 1-second looping noise
      const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource();
      noise.buffer = buf; noise.loop = true;
      // Two bandpass layers for electrical texture
      const bpf1 = audioCtx.createBiquadFilter();
      bpf1.type = 'bandpass'; bpf1.frequency.value = 2500; bpf1.Q.value = 4;
      const bpf2 = audioCtx.createBiquadFilter();
      bpf2.type = 'bandpass'; bpf2.frequency.value = 900;  bpf2.Q.value = 2;
      const g1 = audioCtx.createGain(); g1.gain.value = 0.22;
      const g2 = audioCtx.createGain(); g2.gain.value = 0.12;
      const master = audioCtx.createGain(); master.gain.value = 1.0;
      // Square-wave LFO at 45 Hz — makes noise stutter into a crackle
      const lfo = audioCtx.createOscillator();
      lfo.type = 'square'; lfo.frequency.value = 45;
      const lfoG = audioCtx.createGain(); lfoG.gain.value = 0.22;
      lfo.connect(lfoG); lfoG.connect(master.gain);
      noise.connect(bpf1); bpf1.connect(g1); g1.connect(master);
      noise.connect(bpf2); bpf2.connect(g2); g2.connect(master);
      master.connect(audioCtx.destination);
      noise.start(); lfo.start();
      shieldSoundNodes = { noise, lfo };
    }

    function stopShieldSound() {
      if (!shieldSoundNodes) return;
      try { shieldSoundNodes.noise.stop(); shieldSoundNodes.lfo.stop(); } catch(e) {}
      shieldSoundNodes = null;
    }

    function playShieldBlockSound() {
      const t = audioCtx.currentTime;
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(300, t);
      o.frequency.linearRampToValueAtTime(600, t + 0.08);
      o.frequency.linearRampToValueAtTime(300, t + 0.16);
      g.gain.setValueAtTime(0.18, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.16);
      o.start(t); o.stop(t + 0.16);
    }

    // ─── Music (HTML5 Audio) ──────────────────────────────────────────────────
    const BASE = 'https://www.fesliyanstudios.com/download-link.php?src=i&id=';
    const tracks = [
      { name: 'Feels Good',             id: 417  },
      { name: 'Emotion',                id: 458  },
      { name: 'Silly Feet',             id: 394  },
      { name: 'Beating Heart',          id: 392  },
      { name: 'Lost In Dance',          id: 389  },
      { name: 'Dodging Lasers',         id: 2893 },
      { name: 'Bass Addict',            id: 2887 },
      { name: 'Paranoia Dance',         id: 2909 },
      { name: 'Give Me Back My Vibes',  id: 2901 },
      { name: 'Erosion',                id: 2741 },
      { name: 'Senses',                 id: 2711 },
      { name: 'Lily',                   id: 2697 },
      { name: 'Groovin',                id: 2677 },
      { name: 'Utopia',                 id: 2663 },
      { name: 'Slaps',                  id: 1002 },
      { name: 'ShakaLaka',              id: 582  },
      { name: 'Shake It Up',            id: 524  },
      { name: 'Let Go',                 id: 432  },
      { name: 'Pyromania Normal',       id: 2917 },
      { name: 'JPOP',                   id: 1726 },
      { name: '8 Bit Surf',             id: 568  },
      { name: 'Fight Club',             id: 391  },
      { name: 'Jump Around',            id: 396  },
      { name: 'Head Bang',              id: 409  },
      { name: 'Land of 8 Bits',         id: 288  },
    ];
    const frenzyTrackMeta = { name: 'Pyromania', id: 2921 };

    const audio = new Audio();
    audio.volume = 0.9;
    let fadeInTimer = null;
    let isMuted = false;
    let muteVolume = 0.9;

    function fadeInMusic() {
      if (fadeInTimer) clearInterval(fadeInTimer);
      audio.volume = 0;
      const targetVol = 0.9;
      const dur = 500; // 500ms
      const startTime = performance.now();
      const step = () => {
        const elapsed = performance.now() - startTime;
        const progress = Math.min(1, elapsed / dur);
        audio.volume = progress * targetVol;
        if (progress < 1) fadeInTimer = setTimeout(step, 16);
      };
      fadeInTimer = setTimeout(step, 16);
    }

    let useFrenzyMusic = false;
    let preFrenzyQueueIdx = 0;

    // Shuffled queue — cycles through every track before repeating any
    let trackQueue = [];
    let trackQueueIdx = 0;

    function buildTrackQueue(avoidIdx) {
      trackQueue = Array.from({ length: tracks.length }, (_, i) => i);
      for (let i = trackQueue.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [trackQueue[i], trackQueue[j]] = [trackQueue[j], trackQueue[i]];
      }
      if (avoidIdx !== undefined && trackQueue[0] === avoidIdx && trackQueue.length > 1)
        [trackQueue[0], trackQueue[1]] = [trackQueue[1], trackQueue[0]];
      trackQueueIdx = 0;
    }

    buildTrackQueue();
    let currentTrackIdx = trackQueue[0];

    audio.addEventListener('ended', () => {
      if (useFrenzyMusic) { fadeInMusic(); audio.play().catch(() => {}); return; }
      const last = trackQueue[trackQueueIdx];
      trackQueueIdx++;
      if (trackQueueIdx >= trackQueue.length) buildTrackQueue(last);
      currentTrackIdx = trackQueue[trackQueueIdx];
      setTrackSrc();
      fadeInMusic();
      audio.play().catch(() => {});
    });

    function setTrackSrc() {
      const meta = useFrenzyMusic ? frenzyTrackMeta : tracks[currentTrackIdx];
      audio.src = BASE + meta.id;
      document.getElementById('now-playing').textContent = meta.name;
    }

    function startMusic() {
      setTrackSrc();
      audio.addEventListener('loadedmetadata', function seekAndPlay() {
        audio.removeEventListener('loadedmetadata', seekAndPlay);
        const safeDuration = Math.max(0, audio.duration - 20);
        if (safeDuration > 0) audio.currentTime = Math.random() * safeDuration;
        fadeInMusic();
        audio.play().catch(() => {});
      });
    }

    function stopMusic() {
      audio.pause();
    }

    function toggleMute() {
      isMuted = !isMuted;
      if (isMuted) {
        muteVolume = audio.volume;
        audio.volume = 0;
      } else {
        audio.volume = muteVolume;
      }
    }

    function syncMusicToState() {
      if (state === 'playing') {
        if (audio.paused) audio.play().catch(() => {});
      } else {
        audio.pause();
        stopShieldSound();
      }
    }

    // ─── State ────────────────────────────────────────────────────────────────
    let state = 'idle';
    let speedMultiplier = 1.0;
    let trailEnabled = false;
    let frenzyTextPerimPos = 0;
    let shieldIsOn      = false;
    let shieldEndTime   = 0;
    let shieldReadyTime = 0;
    const trailMaxLength = 100;
    let ballTrail = [];
    let trailActive = false, trailEndTime = 0, nextTrailTime = 0;
    let trailPausedRemaining = 0; // ms remaining when game was paused

    const keys = {};
    let lastPlayerShot = 0;
    let nextAIShot = 0;

    // Charging weapon system
    let playerChargeLevel = 0;      // 0-1 (0% to 100%)
    let isPlayerCharging = false;
    let playerChargeStartTime = 0;
    const CHARGE_TIME_MS = 2000;    // time to reach 100%
    const CHARGE_LEVELS = [0, 0.33, 0.66, 1.0]; // tap, medium, high, full

    // Charging sound state
    let chargeOscillator = null;
    let chargeGain = null;
    let isChargeSoundPlaying = false;

    let playerBullets = [], aiBullets = [];
    let aiHoles = [], playerHoles = [];
    let particles = [];
    let rallyCount = 0;
    let shakeMagnitude = 0;
    let shakeDuration = 0;

    const player = { x: 20,          y: H / 2 - PADDLE_H / 2, score: 0 };
    const ai     = { x: W-20-PADDLE_W, y: H / 2 - PADDLE_H / 2, score: 0 };
    const ball   = { x: W/2, y: H/2, vx: 0, vy: 0, speed: 5, spin: 0 };

    // Track paddle velocities for spin calculation
    let playerPrevY = player.y;
    let aiPrevY = ai.y;

    let mouseY = H / 2;
    let winnerText = '';
    let winReason  = '';

    function setSpeed(v) {
      speedMultiplier = Math.min(2.0, Math.max(0.5, parseFloat(v.toFixed(1))));
    }

    // ─── Input ────────────────────────────────────────────────────────────────
    canvas.addEventListener('mousemove', e => {
      const r = canvas.getBoundingClientRect();
      mouseY = e.clientY - r.top;
    });

    canvas.addEventListener('click', () => {
      if (state === 'idle' || state === 'win') { audioCtx.resume(); resetGame(); state = 'playing'; startMusic(); }
    });

    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      const arrows = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'];
      if ([...arrows, ' '].includes(e.key)) e.preventDefault();

      if (e.key === ' ') {
        if (state === 'idle' || state === 'win') { audioCtx.resume(); resetGame(); state = 'playing'; startMusic(); }
        else if (state === 'playing') {
          state = 'paused';
          stopShieldSound(); stopChargingSound(); shieldIsOn = false;
          if (trailActive) trailPausedRemaining = Math.max(0, trailEndTime - performance.now());
        }
        else if (state === 'paused') {
          state = 'playing';
          if (trailActive) trailEndTime = performance.now() + trailPausedRemaining;
        }
        syncMusicToState();
      }

      // Speed: + = faster, - = slower (keyboard and numpad)
      if (e.key === '+' || e.key === '=' || e.code === 'NumpadAdd')      setSpeed(speedMultiplier + 0.1);
      if (e.key === '-' || e.key === '_' || e.code === 'NumpadSubtract') setSpeed(speedMultiplier - 0.1);

      // Mute toggle: 5 or Numpad5
      if (e.key === '5' || e.code === 'Numpad5') toggleMute();

    });

    document.addEventListener('keyup', e => {
      keys[e.key] = false;

      // Fire charged shot when releasing →
      if ((e.key === 'ArrowRight') && isPlayerCharging) {
        firePlayerBullet(playerChargeLevel);
        isPlayerCharging = false;
        playerChargeLevel = 0;
      }
    });


    // ─── Game logic ───────────────────────────────────────────────────────────
    function resetGame() {
      stopShieldSound(); stopChargingSound(); shieldIsOn = false; shieldEndTime = 0; shieldReadyTime = 0;
      applyNextBackground();
      player.score = 0; ai.score = 0;
      document.getElementById('score-player').textContent = 0;
      document.getElementById('score-ai').textContent = 0;
      player.y = H / 2 - PADDLE_H / 2;
      ai.y     = H / 2 - PADDLE_H / 2;
      mouseY   = H / 2;
      playerBullets = []; aiBullets = [];
      aiHoles = []; playerHoles = [];
      particles = [];
      trailActive = false; trailEnabled = false; ballTrail = [];
      useFrenzyMusic = false; buildTrackQueue(); currentTrackIdx = trackQueue[0];
      scheduleNextAIShot();
      scheduleNextTrail();
      launchBall();
    }

    function scheduleNextTrail() {
      nextTrailTime = performance.now() + 10000 + Math.random() * 30000;
    }

    function scheduleNextAIShot() {
      nextAIShot = performance.now() + AI_SHOT_MIN + Math.random() * (AI_SHOT_MAX - AI_SHOT_MIN);
    }

    function launchBall(towardAI = Math.random() < 0.5) {
      ball.x = W / 2; ball.y = H / 2; ball.speed = 5;
      const angle = Math.random() * 0.6 - 0.3;
      ball.vx = ball.speed * (towardAI ? 1 : -1) * Math.cos(angle);
      ball.vy = ball.speed * Math.sin(angle);
      ballTrail = [];
      rallyCount = 0;
    }

    function addHole(holesArr, paddle, hitY) {
      if (holesArr.length >= MAX_HOLES) return;
      const relY = hitY - paddle.y;
      if (!holesArr.some(h => Math.abs(h - relY) < HOLE_SIZE + 2)) {
        holesArr.push(relY);
        if (holesArr.length >= MAX_HOLES) {
          // Paddle destroyed — other team wins
          const who = paddle === player ? 'CPU' : 'YOU';
          state = 'win';
          winnerText = who === 'YOU' ? 'YOU WIN!' : 'CPU WINS!';
          winReason  = who === 'YOU' ? 'CPU paddle destroyed by bullets' : 'Your paddle was shot to pieces';
          syncMusicToState();
        }
      }
    }

    function isHole(holesArr, paddle, testY) {
      return holesArr.some(relY => {
        const absY = paddle.y + relY;
        return testY >= absY - HOLE_SIZE / 2 && testY <= absY + HOLE_SIZE / 2;
      });
    }

    function updateTrail() {
      const now = performance.now();
      if (!trailActive && now >= nextTrailTime) {
        trailActive = true; trailEnabled = true;
        trailEndTime = now + TRAIL_DURATION;
        if (state === 'playing') {
          stopMusic();
          preFrenzyQueueIdx = trackQueueIdx;
          useFrenzyMusic = true;
          startMusic();
        }
      }
      if (trailActive && now >= trailEndTime) {
        trailActive = false; trailEnabled = false;
        ballTrail = []; scheduleNextTrail();
        if (state === 'playing') {
          stopMusic();
          useFrenzyMusic = false;
          trackQueueIdx = preFrenzyQueueIdx + 1;
          if (trackQueueIdx >= trackQueue.length) buildTrackQueue(trackQueue[preFrenzyQueueIdx]);
          currentTrackIdx = trackQueue[trackQueueIdx];
          startMusic();
        }
      }
    }

    function updatePlayer() {
      const kUp   = keys['ArrowUp']   || keys['8'] === true && false || e_num8();
      const kDown = keys['ArrowDown'] || e_num2();

      if (kUp || kDown) {
        if (kUp)   player.y -= KEY_PADDLE_SPEED;
        if (kDown) player.y += KEY_PADDLE_SPEED;
        // Sync mouseY so switching back to mouse is seamless
        mouseY = player.y + PADDLE_H / 2;
      } else {
        player.y = mouseY - PADDLE_H / 2;
      }
      player.y = Math.max(0, Math.min(H - PADDLE_H, player.y));
    }

    // Numpad key checks via e.code stored in keys-by-code map
    const codeKeys = {};
    document.addEventListener('keydown', e => { codeKeys[e.code] = true; });
    document.addEventListener('keyup',   e => {
      codeKeys[e.code] = false;

      // Fire charged shot when releasing Numpad6
      if ((e.code === 'Numpad6') && isPlayerCharging) {
        firePlayerBullet(playerChargeLevel);
        isPlayerCharging = false;
        playerChargeLevel = 0;
      }
    });

    const e_num8 = () => codeKeys['Numpad8'];
    const e_num2 = () => codeKeys['Numpad2'];
    const e_num6 = () => codeKeys['Numpad6'];
    const e_num4 = () => codeKeys['Numpad4'];

    // Rewrite updatePlayer cleanly now that codeKeys is defined
    // (overwrite previous definition)
    window._updatePlayer = function() {
      const kUp   = keys['ArrowUp']   || codeKeys['Numpad8'];
      const kDown = keys['ArrowDown'] || codeKeys['Numpad2'];

      if (kUp || kDown) {
        if (kUp)   player.y -= KEY_PADDLE_SPEED;
        if (kDown) player.y += KEY_PADDLE_SPEED;
        mouseY = player.y + PADDLE_H / 2;
      } else {
        player.y = mouseY - PADDLE_H / 2;
      }
      player.y = Math.max(0, Math.min(H - PADDLE_H, player.y));
    };

    function updateAI() {
      const center = ai.y + PADDLE_H / 2;
      const diff = ball.y - center;
      const reaction = 0.08 + 0.04 * (Math.abs(ball.x - ai.x) / W);
      ai.y += diff * reaction;
      ai.y = Math.max(0, Math.min(H - PADDLE_H, ai.y));
    }

    function tryPlayerShoot() {
      const shootKeyPressed = keys['ArrowRight'] || codeKeys['Numpad6'];

      // Start charging if key pressed and not already charging
      if (shootKeyPressed && !isPlayerCharging) {
        isPlayerCharging = true;
        playerChargeStartTime = performance.now();
        playerChargeLevel = 0;
        startChargingSound(); // start charging sound
      }

      // Update charge level while holding
      if (isPlayerCharging) {
        const elapsed = performance.now() - playerChargeStartTime;
        playerChargeLevel = Math.min(1, elapsed / CHARGE_TIME_MS);
      }
    }

    function firePlayerBullet(chargeLevel) {
      const now = performance.now();
      if (now - lastPlayerShot < SHOT_COOLDOWN) return;
      lastPlayerShot = now;

      // Determine power level based on charge (4 levels)
      let powerLevel = 0;
      if (chargeLevel < 0.01) powerLevel = 0;      // tap = level 0
      else if (chargeLevel < 0.33) powerLevel = 1; // medium
      else if (chargeLevel < 0.66) powerLevel = 2; // high
      else powerLevel = 3;                         // full

      // Add bullet with power metadata
      playerBullets.push({
        x: player.x + PADDLE_W + 2,
        y: player.y + PADDLE_H / 2,
        power: powerLevel,
        chargePercent: chargeLevel
      });

      // Audio: stop charging sound and play release sound correlated to charge level
      stopChargingSound();
      playChargeFireSound(chargeLevel);
    }

    function tryAIShoot() {
      const now = performance.now();
      if (now < nextAIShot) return;
      scheduleNextAIShot();
      aiBullets.push({ x: ai.x - 2, y: ai.y + PADDLE_H / 2 });
      playAIShootSound();
    }

    function updateShieldState() {
      const now  = performance.now();
      const wants = keys['ArrowLeft'] || codeKeys['Numpad4'];
      const canActivate = now >= shieldReadyTime;
      const wasOn = shieldIsOn;
      // Arm a new activation window when key is first pressed and cooldown is done
      if (wants && canActivate && !wasOn) shieldEndTime = now + SHIELD_MAX_MS;
      shieldIsOn = wants && canActivate && now < shieldEndTime;
      if (wasOn && !shieldIsOn) { shieldReadyTime = now + SHIELD_RECHARGE_MS; stopShieldSound(); }
      if (!wasOn &&  shieldIsOn) startShieldSound();
    }

    // ─── Particle System ──────────────────────────────────────────────────────
    class Particle {
      constructor(x, y, vx, vy, life, color, size) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.life = life; this.maxLife = life;
        this.color = color; this.size = size;
      }
    }

    function spawnHitParticles(x, y, dir) {
      const extra = rallyCount >= 10 ? 8 : rallyCount >= 5 ? 4 : 0;
      const count = 8 + extra;
      const baseColor = dir > 0 ? '#4af' : '#f74';
      const hotColor = '#ff3300';
      const color = rallyCount >= 10 ? hotColor : baseColor;
      for (let i = 0; i < count; i++) {
        const angle = (Math.random() - 0.5) * Math.PI * 0.8 + (dir > 0 ? 0 : Math.PI);
        const speed = 1.5 + Math.random() * 3;
        particles.push(new Particle(
          x, y,
          Math.cos(angle) * speed,
          Math.sin(angle) * speed,
          0.4 + Math.random() * 0.3,
          color,
          2 + Math.random() * 2
        ));
      }
    }

    function spawnScoreExplosion(x, y, color) {
      const count = 24;
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2 + Math.random() * 0.3;
        const speed = 2 + Math.random() * 5;
        particles.push(new Particle(
          x, y,
          Math.cos(angle) * speed,
          Math.sin(angle) * speed,
          0.6 + Math.random() * 0.4,
          color,
          2 + Math.random() * 3
        ));
      }
    }

    function drawParticles() {
      ctx.save();
      particles.forEach(p => {
        const t = p.life / p.maxLife;
        ctx.globalAlpha = t;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * t, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    function updateBullets() {
      const shield = shieldIsOn;
      const shieldX = player.x + PADDLE_W + 2;

      playerBullets = playerBullets.filter(b => {
        // Speed scales with power level (0-3): tap=1x, medium=1.5x, high=2x, full=3x
        const speedMultiplier_bullet = 1 + (b.power || 0) * 0.65;
        b.x += BULLET_SPEED * speedMultiplier * speedMultiplier_bullet;
        if (b.x > W) return false;
        const inX = b.x + BULLET_R >= ai.x && b.x - BULLET_R <= ai.x + PADDLE_W;
        const inY = b.y >= ai.y && b.y <= ai.y + PADDLE_H;
        if (inX && inY) {
          // Full power (level 3) bullets destroy the paddle immediately
          if (b.power === 3) {
            state = 'win';
            player.score += 10;
            document.getElementById('score-player').textContent = player.score;
            winnerText = 'YOU WIN!';
            winReason = 'Paddle destroyed by full power shot!';
            syncMusicToState();
          } else if (!isHole(aiHoles, ai, b.y)) {
            addHole(aiHoles, ai, b.y);
            playBulletHitSound();
          }
          return false;
        }
        return true;
      });

      aiBullets = aiBullets.filter(b => {
        b.x -= BULLET_SPEED * speedMultiplier;
        if (b.x < 0) return false;
        if (shield) {
          const inSX = b.x - BULLET_R <= shieldX + 8 && b.x + BULLET_R >= shieldX;
          const inSY = b.y >= player.y && b.y <= player.y + PADDLE_H;
          if (inSX && inSY) { playShieldBlockSound(); return false; }
        }
        const inX = b.x - BULLET_R <= player.x + PADDLE_W && b.x + BULLET_R >= player.x;
        const inY = b.y >= player.y && b.y <= player.y + PADDLE_H;
        if (inX && inY) {
          if (!isHole(playerHoles, player, b.y)) { addHole(playerHoles, player, b.y); playBulletHitSound(); }
          return false;
        }
        return true;
      });
    }

    function collidesWithPaddle(paddle) {
      if (!(ball.x - BALL_R < paddle.x + PADDLE_W && ball.x + BALL_R > paddle.x &&
            ball.y + BALL_R > paddle.y && ball.y - BALL_R < paddle.y + PADDLE_H)) return false;
      const holes = paddle === player ? playerHoles : aiHoles;
      return !isHole(holes, paddle, ball.y);
    }

    function reflect(paddle) {
      // hitPos: -1 (top) to 1 (bottom)
      const hitPos = ((ball.y - paddle.y) / PADDLE_H - 0.5) * 2;

      // Spin from curved paddle: depends on hit position and paddle curve constant
      ball.spin = hitPos * PADDLE_CURVE * 8;

      // Add paddle velocity contribution to spin (small factor)
      const paddleVy = paddle === player ? playerPrevY - paddle.y : aiPrevY - paddle.y;
      ball.spin += paddleVy * 0.3;

      // Reflect ball and set velocity
      const angle  = hitPos * Math.PI * 0.65;
      ball.speed = Math.min(ball.speed + 0.3, 14);
      const dir = paddle === player ? 1 : -1;
      ball.vx = dir * ball.speed * Math.cos(angle);
      ball.vy = ball.speed * Math.sin(angle);
    }

    function update() {
      if (state !== 'playing') return;

      updateTrail();

      // Track previous paddle positions for velocity calculation
      playerPrevY = player.y;
      aiPrevY = ai.y;

      window._updatePlayer();
      updateAI();
      updateShieldState();
      tryPlayerShoot();
      tryAIShoot();
      updateBullets();

      const frenzyMult = trailActive
        ? 1 + (TRAIL_SPEED_MULT - 1) * Math.min(1, (TRAIL_DURATION - (trailEndTime - performance.now())) / 5000)
        : 1;
      const spd = speedMultiplier * frenzyMult;

      // Apply spin as a vertical force — this curves the ball mid-flight
      ball.vy += ball.spin * 0.15;
      // Spin decays over time
      ball.spin *= 0.995;

      ball.x += ball.vx * spd;
      ball.y += ball.vy * spd;

      if (trailEnabled) {
        ballTrail.push({ x: ball.x, y: ball.y });
        if (ballTrail.length > trailMaxLength) ballTrail.shift();
      }

      if (ball.y - BALL_R <= 0) { ball.y = BALL_R; ball.vy = Math.abs(ball.vy); playFloorCeilingSound(); }
      if (ball.y + BALL_R >= H) { ball.y = H - BALL_R; ball.vy = -Math.abs(ball.vy); playFloorCeilingSound(); }

      if (ball.vx < 0 && collidesWithPaddle(player)) {
        ball.x = player.x + PADDLE_W + BALL_R; reflect(player); playPaddleSound(); spawnHitParticles(ball.x, ball.y, 1);
        rallyCount++;
        shakeMagnitude = Math.min(1 + rallyCount * 0.4, 6);
        shakeDuration = 6;
      }
      if (ball.vx > 0 && collidesWithPaddle(ai)) {
        ball.x = ai.x - BALL_R; reflect(ai); playPaddleSound(); spawnHitParticles(ball.x, ball.y, -1);
        rallyCount++;
        shakeMagnitude = Math.min(1 + rallyCount * 0.4, 6);
        shakeDuration = 6;
      }

      if (ball.x - BALL_R < 0) {
        ai.score += trailActive ? TRAIL_SCORE_MULT : 1;
        document.getElementById('score-ai').textContent = ai.score;
        spawnScoreExplosion(0, ball.y, '#f74');
        shakeMagnitude = 8;
        shakeDuration = 14;
        checkWin('CPU');
        if (state === 'playing') launchBall(false);
      } else if (ball.x + BALL_R > W) {
        player.score += trailActive ? TRAIL_SCORE_MULT : 1;
        document.getElementById('score-player').textContent = player.score;
        spawnScoreExplosion(W, ball.y, '#4af');
        shakeMagnitude = 8;
        shakeDuration = 14;
        checkWin('YOU');
        if (state === 'playing') launchBall(true);
      }

      // Update particles
      const dt = 1 / 60;
      particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.08; // light gravity
        p.life -= dt;
        return p.life > 0;
      });
    }

    function checkWin(who) {
      const s = who === 'YOU' ? player.score : ai.score;
      if (s >= WIN_SCORE) {
        state = 'win';
        winnerText = who === 'YOU' ? 'YOU WIN!' : 'CPU WINS!';
        winReason  = `First to ${WIN_SCORE} points`;
        syncMusicToState();
      }
    }

    // ─── Drawing ──────────────────────────────────────────────────────────────
    function drawDashedCenter() {
      ctx.setLineDash([10, 14]);
      ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
      ctx.setLineDash([]);
    }

    function drawPaddleWithHoles(paddle, color, holes) {
      // Charging glow for player paddle
      if (paddle === player && playerChargeLevel > 0) {
        // Calculate glow intensity based on charge (0 to 1)
        const chargeIntensity = playerChargeLevel;

        // Color shift: cool blue (#4af) → warm orange (#ff6b35)
        // Interpolate between cool and warm
        const coolR = 68, coolG = 170, coolB = 255;   // #4af
        const warmR = 255, warmG = 107, warmB = 53;   // #ff6b35
        const r = Math.round(coolR + (warmR - coolR) * chargeIntensity);
        const g = Math.round(coolG + (warmG - coolG) * chargeIntensity);
        const b = Math.round(coolB + (warmB - coolB) * chargeIntensity);
        const glowColor = `rgb(${r},${g},${b})`;

        // Glow blur increases with charge (base 8 → max 35)
        const glowBlur = 8 + chargeIntensity * 27;

        // Draw glow halo
        ctx.shadowColor = glowColor;
        ctx.shadowBlur = glowBlur;
        ctx.globalAlpha = 0.3 + chargeIntensity * 0.4; // fade from 0.3 to 0.7, not too bright
        ctx.fillStyle = glowColor;
        ctx.beginPath();
        ctx.roundRect(paddle.x - 2, paddle.y - 2, PADDLE_W + 4, PADDLE_H + 4, 4);
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      // Draw paddle body
      ctx.fillStyle = color;
      ctx.shadowBlur = 0; // reset shadow
      ctx.beginPath(); ctx.roundRect(paddle.x, paddle.y, PADDLE_W, PADDLE_H, 4); ctx.fill();
      ctx.fillStyle = '#111';
      holes.forEach(relY => {
        ctx.fillRect(paddle.x, paddle.y + relY - HOLE_SIZE / 2, PADDLE_W, HOLE_SIZE);
      });
    }

    function drawShieldCrackle() {
      if (!shieldIsOn) return;
      const faceX = player.x + PADDLE_W;
      const py = player.y, ph = PADDLE_H, px = player.x;
      ctx.save();

      // Glow halo along the opponent-facing edge
      const grd = ctx.createLinearGradient(faceX, 0, faceX + 20, 0);
      grd.addColorStop(0, 'rgba(80,200,255,0.55)');
      grd.addColorStop(1, 'rgba(80,200,255,0)');
      ctx.fillStyle = grd; ctx.shadowColor = '#4df'; ctx.shadowBlur = 22;
      ctx.fillRect(faceX, py - 6, 20, ph + 12);

      // Jagged lightning bolts projecting toward opponent
      const numBolts = 5 + Math.floor(Math.random() * 5);
      for (let i = 0; i < numBolts; i++) {
        const startY = py + Math.random() * ph;
        const reach  = 10 + Math.random() * 24;
        const segs   = 2 + Math.floor(Math.random() * 3);
        const bright = Math.random() < 0.55;
        ctx.strokeStyle = bright ? 'rgba(210,245,255,0.95)' : 'rgba(80,190,255,0.72)';
        ctx.lineWidth   = bright ? 1.6 : 0.8;
        ctx.shadowColor = '#4df'; ctx.shadowBlur = bright ? 12 : 5;
        ctx.beginPath(); ctx.moveTo(faceX, startY);
        let cx = faceX;
        for (let s = 0; s < segs; s++) {
          cx += reach / segs;
          ctx.lineTo(cx, startY + (Math.random() - 0.5) * 16);
        }
        ctx.stroke();
      }

      // Sparks — heavy on the face side, lighter on top/bottom/back edges
      const sparkCount = 7 + Math.floor(Math.random() * 7);
      for (let i = 0; i < sparkCount; i++) {
        const r = Math.random();
        let sx, sy;
        if (r < 0.55) {          // opponent-facing side
          sx = faceX + Math.random() * 20;
          sy = py + Math.random() * ph;
        } else if (r < 0.75) {   // top / bottom edges
          sx = px + Math.random() * (PADDLE_W + 8);
          sy = (Math.random() < 0.5 ? py : py + ph) + (Math.random() - 0.5) * 5;
        } else {                  // back edge (rare)
          sx = px + (Math.random() - 0.5) * 5;
          sy = py + Math.random() * ph;
        }
        ctx.fillStyle = Math.random() < 0.35 ? '#fff' : (Math.random() < 0.5 ? '#8ef' : '#acf');
        ctx.shadowColor = '#4df'; ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(sx, sy, 0.6 + Math.random() * 1.8, 0, Math.PI * 2);
        ctx.fill();
      }

      // Flickering edge lines along top and bottom of paddle
      ctx.lineWidth = 1; ctx.shadowBlur = 5;
      ctx.strokeStyle = `rgba(120,230,255,${0.35 + Math.random() * 0.45})`;
      ctx.beginPath(); ctx.moveTo(px, py);
      ctx.lineTo(faceX + 4 + Math.random() * 6, py + (Math.random() - 0.5) * 3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px, py + ph);
      ctx.lineTo(faceX + 4 + Math.random() * 6, py + ph + (Math.random() - 0.5) * 3); ctx.stroke();

      ctx.restore();
    }

    function drawBullets() {
      ctx.shadowBlur = 8;
      ctx.fillStyle = '#ff0'; ctx.shadowColor = '#ff0';
      playerBullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x,b.y,BULLET_R,0,Math.PI*2); ctx.fill(); });
      ctx.fillStyle = '#f60'; ctx.shadowColor = '#f60';
      aiBullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x,b.y,BULLET_R,0,Math.PI*2); ctx.fill(); });
      ctx.shadowBlur = 0;
    }

    function ballHeatColor() {
      if (rallyCount >= 10) return '#ff3300';   // hot red
      if (rallyCount >= 5)  return '#ff9900';   // warm orange
      return '#ffffff';                          // cool white
    }

    function drawBall() {
      const color = ballHeatColor();
      const glow = rallyCount >= 10 ? 18 : rallyCount >= 5 ? 8 : 0;
      if (glow > 0) {
        ctx.shadowColor = color;
        ctx.shadowBlur = glow;
      }
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }

    function drawTrail() {
      if (!trailEnabled || ballTrail.length === 0) return;
      const hues = ['#f00','#f80','#ff0','#0f0','#08f','#80f','#f0f'];
      for (let i = 0; i < ballTrail.length; i++) {
        const p = ballTrail[i];
        const progress = i / ballTrail.length;
        ctx.fillStyle = hues[Math.floor(progress * hues.length) % hues.length];
        ctx.globalAlpha = 0.65 * progress;
        ctx.beginPath(); ctx.arc(p.x, p.y, BALL_R * 0.7, 0, Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function updateFrenzyCounter() {
      const left     = document.getElementById('frenzy-left');
      const right    = document.getElementById('frenzy-right');
      const countdown = document.getElementById('frenzy-countdown');
      left.style.visibility = 'hidden'; left.innerHTML = '';
      right.style.visibility = 'hidden'; right.innerHTML = '';
      if (!trailActive || state === 'win' || state === 'idle') {
        countdown.style.visibility = 'hidden';
        return;
      }
      const remaining = state === 'paused' ? trailPausedRemaining : trailEndTime - performance.now();
      const secs = Math.max(0, Math.ceil(remaining / 1000));
      countdown.style.visibility = 'visible';
      countdown.innerHTML = `<div class="rainbow-text">✦ RAINBOW FRENZY ✦</div><div>🌈⚡ <span style="font-size:32px">${secs}s</span> ⚡🌈</div>`;
    }

    function drawFrenzyEdgeText() {
      sctx.clearRect(0, 0, SW, SH);
      if (!trailActive || state === 'win' || state === 'idle') return;

      const text = `!! x${TRAIL_SPEED_MULT} SPEED  *  Rainbow Frenzy  *  POINTS x${TRAIL_SCORE_MULT} !!`;

      const perimeter = 2 * (SW + SH);
      if (state === 'playing') frenzyTextPerimPos = (frenzyTextPerimPos + 3.5) % perimeter;

      const d = frenzyTextPerimPos;
      const gc = SG / 2; // gutter center offset from edge
      let px, py, angle;
      if      (d < SW)          { px = d;              py = gc;           angle = 0; }
      else if (d < SW + SH)     { px = SW - gc;        py = d - SW;       angle = Math.PI / 2; }
      else if (d < 2*SW + SH)   { px = SW-(d-SW-SH);   py = SH - gc;      angle = Math.PI; }
      else                      { px = gc;              py = SH-(d-2*SW-SH); angle = -Math.PI / 2; }

      const rainbow = ['#f00','#f80','#ff0','#0f0','#08f','#a0f'];
      const colorOffset = Math.floor((performance.now() / 20) % 360 / 60);

      sctx.save();
      sctx.translate(px, py);
      sctx.rotate(angle);
      sctx.font = 'bold 16px Courier New';
      sctx.textBaseline = 'middle';

      const chars = text.split('');
      const widths = chars.map(ch => sctx.measureText(ch).width);
      const totalW = widths.reduce((a, b) => a + b, 0);

      let cx = -totalW / 2;
      chars.forEach((ch, i) => {
        sctx.strokeStyle = 'rgba(0,0,0,0.9)';
        sctx.lineWidth = 3;
        sctx.fillStyle = rainbow[(i + colorOffset) % rainbow.length];
        sctx.strokeText(ch, cx, 0);
        sctx.fillText(ch, cx, 0);
        cx += widths[i];
      });
      sctx.restore();
    }

    function drawOverlay(text, sub, reason) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 52px Courier New'; ctx.textAlign = 'center';
      ctx.fillText(text, W/2, H/2 - 20);
      if (reason) {
        ctx.font = 'italic 16px Courier New'; ctx.fillStyle = '#fc8';
        ctx.fillText(reason, W/2, H/2 + 18);
      }
      ctx.font = '18px Courier New'; ctx.fillStyle = '#aaa';
      ctx.fillText(sub, W/2, H/2 + (reason ? 50 : 34));
    }

    function draw() {
      if (trailActive) {
        const hue = (performance.now() / 18.75) % 360;
        bgA.style.filter = `hue-rotate(${hue}deg) saturate(1.4)`;
        bgB.style.filter = `hue-rotate(${hue}deg) saturate(1.4)`;
      } else {
        bgA.style.filter = '';
        bgB.style.filter = '';
      }
      frenzyOverlay.style.opacity = '0';
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = 'rgba(17,17,17,0.85)'; ctx.fillRect(0, 0, W, H);

      ctx.save();
      if (shakeDuration > 0) {
        const dx = (Math.random() * 2 - 1) * shakeMagnitude;
        const dy = (Math.random() * 2 - 1) * shakeMagnitude;
        ctx.translate(dx, dy);
        shakeDuration--;
      }

      drawDashedCenter();
      drawPaddleWithHoles(player, '#4af', playerHoles);
      drawPaddleWithHoles(ai, '#f74', aiHoles);
      drawShieldCrackle();
      updateFrenzyCounter();
      if (state !== 'idle') { drawTrail(); drawBall(); drawParticles(); drawBullets(); }
      drawFrenzyEdgeText();
      if (state === 'idle')   drawOverlay('SPACE PONG', 'SPACE or Click to start');
      else if (state === 'paused') drawOverlay('PAUSED', 'Press SPACE to resume');
      else if (state === 'win')    drawOverlay(winnerText, 'SPACE or Click to play again', winReason);

      ctx.restore();

      // Rally heat border glow
      const wrapper = document.getElementById('canvas-wrapper');
      if (rallyCount >= 10) {
        const pulse = 0.6 + 0.4 * Math.sin(performance.now() / 150);
        const intensity = Math.round(20 + rallyCount * 1.5);
        wrapper.style.boxShadow = `0 0 ${intensity}px ${Math.round(intensity/2)}px rgba(255,50,0,${(pulse * 0.8).toFixed(2)})`;
      } else if (rallyCount >= 5) {
        wrapper.style.boxShadow = `0 0 14px 4px rgba(255,150,0,0.45)`;
      } else {
        wrapper.style.boxShadow = '';
      }
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
  </script>
</body>
</html>
