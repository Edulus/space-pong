<!-- Updated index.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edward Kasimir - Launch Page</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="layout.css" />
    <link rel="stylesheet" href="animation.css" />
  </head>
  <body>
    <button
      id="muteToggle"
      class="mute-toggle"
      type="button"
      aria-label="Mute sound"
      aria-pressed="false"
    >
      🔊
    </button>

    <div class="container">
      <div class="button-wrapper" id="button1Wrapper">
        <a
          href="https://edulus.github.io/Close-Encounters-with-5-Tones/"
          class="button"
          id="button1"
          aria-label="Close Encounters with 5 Tones"
          aria-describedby="tooltip1"
        ></a>
        <div class="tooltip" id="tooltip1" role="tooltip">
          Close Encounters with 5 Tones
        </div>
      </div>
      <div class="button-wrapper" id="button2Wrapper">
        <a
          href="https://edulus.github.io/Swirling-Cosmic-Egg/"
          class="button"
          id="button2"
          aria-label="Swirling Cosmic Egg"
          aria-describedby="tooltip2"
        ></a>
        <div class="tooltip" id="tooltip2" role="tooltip">
          Swirling Cosmic Egg
        </div>
      </div>
      <div class="button-wrapper" id="button3Wrapper">
        <a
          href="https://edulus.github.io/Space-Sounds-Generator/"
          class="button"
          id="button3"
          aria-label="Space Sounds Generator"
          aria-describedby="tooltip3"
        ></a>
        <div class="tooltip" id="tooltip3" role="tooltip">
          Space Sounds Generator
        </div>
      </div>
      <div class="button-wrapper" id="button4Wrapper">
        <a
          href="https://edulus.github.io/Ethereal_Chord_Generator/"
          class="button"
          id="button4"
          aria-label="Ethereal Chord Generator"
          aria-describedby="tooltip4"
        ></a>
        <div class="tooltip" id="tooltip4" role="tooltip">
          Ethereal Chord Generator
        </div>
      </div>
      <div class="button-wrapper" id="button5Wrapper">
        <a
          href="https://edulus.github.io/YT-DLP_Web_Interface/"
          class="button"
          id="button5"
          aria-label="YouTube Audio Extractor"
          aria-describedby="tooltip5"
        ></a>
        <div class="tooltip" id="tooltip5" role="tooltip">
          YouTube Audio Extractor
        </div>
      </div>
    </div>
    <script type="module">
      import { Layout } from "./layout.js";
      import { Animation } from "./animation.js";

      document.addEventListener("DOMContentLoaded", async () => {
        const layout = new Layout();

        // Audio is loaded dynamically so a failure here cannot prevent
        // the click animation from being wired up.
        let audio = null;
        try {
          const { AudioEngine } = await import("./audio.js");
          audio = new AudioEngine();
          audio.armAutoStart();
        } catch (err) {
          console.warn("Audio module failed to load:", err);
        }

        const animation = new Animation(layout, audio);

        // Mute toggle wiring
        const muteBtn = document.getElementById("muteToggle");
        if (audio && muteBtn) {
          const updateMuteUI = () => {
            const muted = audio.isMuted();
            muteBtn.textContent = muted ? "🔇" : "🔊";
            muteBtn.setAttribute("aria-pressed", String(muted));
            muteBtn.setAttribute(
              "aria-label",
              muted ? "Unmute sound" : "Mute sound",
            );
          };
          updateMuteUI();
          muteBtn.addEventListener("click", () => {
            audio.toggleMute();
            updateMuteUI();
          });
        } else if (muteBtn) {
          muteBtn.style.display = "none";
        }
      });
    </script>
  </body>
</html>
