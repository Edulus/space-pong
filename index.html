<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pong</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
      overflow: hidden;
      text-shadow: 0 1px 6px rgba(0,0,0,1), 0 0 12px rgba(0,0,0,0.9);
    }
    #scoreboard {
      display: flex;
      align-items: center;
      width: 804px;
      height: 72px;
      flex-shrink: 0;
      font-size: 48px;
      font-weight: bold;
      letter-spacing: 4px;
    }
    #score-player { flex: 1; text-align: center; }
    #score-ai     { flex: 1; text-align: center; }
    #label-row {
      display: flex;
      width: 804px;
      height: 30px;
      flex-shrink: 0;
      align-items: flex-start;
      font-size: 18px;
      letter-spacing: 2px;
      color: #ddd;
      text-shadow: 0 1px 6px rgba(0,0,0,1), 0 0 12px rgba(0,0,0,0.9);
    }
    #label-player { flex: 1; text-align: center; }
    #label-spacer  { flex: 1; }
    #label-ai     { flex: 1; text-align: center; }
    #frenzy-row {
      display: flex;
      width: 804px;
      height: 32px;
      flex-shrink: 0;
      align-items: center;
      overflow: hidden;
      position: relative; z-index: 3;
    }
    #frenzy-left, #frenzy-right {
      flex: 1;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 1px;
      text-align: center;
      visibility: hidden;
    }
    @keyframes kenBurns {
      from { transform: scale(1.0); }
      to   { transform: scale(1.1); }
    }
    .bg-layer {
      position: fixed; inset: 0;
      background-size: 100% 100%; background-position: center; background-repeat: no-repeat;
      transition: opacity 3s ease;
      z-index: 1; pointer-events: none; opacity: 0;
      transform-origin: center center;
      will-change: transform, opacity;
    }
    #frenzy-overlay {
      position: fixed; inset: 0;
      z-index: 2; pointer-events: none; opacity: 0;
    }
    #scoreboard, #label-row, canvas, #controls, #keys-help, #now-playing-label {
      position: relative; z-index: 3;
    }
    canvas { border: 2px solid #555; cursor: none; }
    #now-playing-center {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    #now-playing-label {
      font-size: 16px; color: #ccc; letter-spacing: 2px;
      text-align: center; text-transform: uppercase;
      text-shadow: 0 1px 6px rgba(0,0,0,1), 0 0 12px rgba(0,0,0,0.9);
    }
    #now-playing {
      font-size: 34px; color: #ddd; letter-spacing: 1px;
      text-align: center; font-family: 'Fredoka One', cursive;
      text-shadow: 0 1px 6px rgba(0,0,0,1), 0 0 12px rgba(0,0,0,0.9);
    }
    .label { color: #aaa; font-size: 11px; letter-spacing: 1px; }
    #keys-help {
      margin-top: 7px; font-size: 11px; color: #bbb; letter-spacing: 1px;
      background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="bg-a" class="bg-layer"></div>
  <div id="bg-b" class="bg-layer"></div>
  <div id="frenzy-overlay"></div>
  <div id="scoreboard">
    <span id="score-player">0</span>
    <div id="now-playing-center">
      <div id="now-playing-label">Now Playing:</div>
      <div id="now-playing">♪ — ♪</div>
    </div>
    <span id="score-ai">0</span>
  </div>
  <div id="label-row">
    <span id="label-player">YOU</span>
    <div id="label-spacer"></div>
    <span id="label-ai">CPU</span>
  </div>
  <div id="frenzy-row">
    <div id="frenzy-left"></div>
    <div id="frenzy-right"></div>
  </div>
  <canvas id="c"></canvas>
  <div id="keys-help">SHIELD: ← or 4 &nbsp;|&nbsp; SHOOT: → or 6 &nbsp;|&nbsp; PAUSE: Space Bar &nbsp;|&nbsp; FASTER: + &nbsp;|&nbsp; SLOWER: -</div>

  <script>
    // ─── Background images (NASA APOD) ───────────────────────────────────────
    const APOD_API_KEY = 'Fek6QhTkzvPLLA22pXlm1mJh5IRQTMq0ZwOsfzZN';
    const APOD_COUNT   = 15;
    const BG_CYCLE_MS  = 30000;

    let bgImages = [];
    let bgMeta   = []; // { title, copyright } — stored for future use
    let bgIndex  = 0;
    let bgCycleInterval = null;

    const bgA = document.getElementById('bg-a');
    const bgB = document.getElementById('bg-b');
    const frenzyOverlay = document.getElementById('frenzy-overlay');
    let activeBg = bgA; // currently visible layer

    function applyNextBackground() {} // no-op stub — resetGame calls this safely

    function restartZoom(el) {
      el.style.animation = 'none';
      el.offsetHeight; // force reflow so the browser resets the animation
      el.style.animation = 'kenBurns 20s linear forwards';
    }

    function crossfadeTo(url) {
      const incoming = activeBg === bgA ? bgB : bgA;
      incoming.style.backgroundImage = `url('${url}')`;
      restartZoom(incoming);
      incoming.style.opacity = '1';
      activeBg.style.opacity = '0';
      activeBg = incoming;
    }

    function startBgCycle() {
      if (bgCycleInterval) clearInterval(bgCycleInterval);
      bgIndex = Math.floor(Math.random() * bgImages.length);
      activeBg = bgA;
      bgB.style.opacity = '0';
      bgA.style.backgroundImage = `url('${bgImages[bgIndex]}')`;
      restartZoom(bgA);
      bgA.style.opacity = '1';
      bgCycleInterval = setInterval(() => {
        bgIndex = (bgIndex + 1) % bgImages.length;
        crossfadeTo(bgImages[bgIndex]);
      }, BG_CYCLE_MS);
    }

    const LOCAL_BG_COUNT = 105; // update if you add or remove images
    const APOD_ENABLED   = false; // ← set to true to re-enable NASA API backgrounds

    // Build the full list, shuffle it, and start immediately — no sequential probing.
    // Change LOCAL_BG_COUNT above if the number of background files changes.
    function loadLocalImages() {
      const candidates = Array.from({ length: LOCAL_BG_COUNT },
                                    (_, i) => `backgrounds/background_${i + 1}.jpg`);
      let remaining = candidates.length;
      const loaded = [];
      candidates.forEach(url => {
        const img = new Image();
        img.onload  = () => { loaded.push(url); finalize(); };
        img.onerror = () => {                    finalize(); };
        img.src = url;
      });
      function finalize() {
        if (--remaining > 0) return;
        bgImages = loaded;
        bgMeta   = bgImages.map(() => ({ title: '', copyright: '' }));
        // Fisher-Yates shuffle for random order every session
        for (let i = bgImages.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [bgImages[i], bgImages[j]] = [bgImages[j], bgImages[i]];
          [bgMeta[i],   bgMeta[j]]   = [bgMeta[j],   bgMeta[i]];
        }
        if (bgImages.length) startBgCycle();
      }
    }

    loadLocalImages();

    // Step 2 — fetch NASA APOD in parallel; swap in if successful
    const APOD_URL = `https://api.nasa.gov/planetary/apod?api_key=${APOD_API_KEY}&count=${APOD_COUNT}`;
    if (APOD_ENABLED) console.log('[APOD] Fetching:', APOD_URL);

    if (APOD_ENABLED) fetch(APOD_URL)
      .then(r => {
        console.log('[APOD] HTTP status:', r.status, r.statusText);
        if (!r.ok) {
          return r.text().then(body => { throw new Error(`APOD HTTP ${r.status}: ${body}`); });
        }
        return r.json();
      })
      .then(data => {
        const images = data.filter(e => e.media_type === 'image');
        if (!images.length) throw new Error('APOD batch contained no images');
        bgImages = images.map(e => e.url);
        bgMeta   = images.map(e => ({ title: e.title || '', copyright: e.copyright || '' }));
        console.log('[APOD] Switched to NASA images:', bgImages.length);
        startBgCycle(); // crossfades into first NASA image
      })
      .catch(err => {
        console.error('[APOD] Fetch failed, keeping local images. Reason:', err.message);
        // local images already loaded and cycling — nothing to do
      });

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 800, H = 500;
    canvas.width = W; canvas.height = H;

    const PADDLE_W = 12, PADDLE_H = 90, BALL_R = 8;
    const KEY_PADDLE_SPEED = 11;
    const WIN_SCORE = 67;
    const BULLET_R = 4, BULLET_SPEED = 9;
    const HOLE_SIZE = 14, MAX_HOLES = 5;
    const SHOT_COOLDOWN = 700;
    const AI_SHOT_MIN = 2500, AI_SHOT_MAX = 5000;
    const SHIELD_MAX_MS      = 5000;
    const SHIELD_RECHARGE_MS = 20000;
    const TRAIL_DURATION = 20000;
    const TRAIL_SPEED_MULT = 3, TRAIL_SCORE_MULT = 3;

    // ─── Audio context ────────────────────────────────────────────────────────
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // ─── SFX ─────────────────────────────────────────────────────────────────
    function playPaddleSound() {
      const t = audioCtx.currentTime;
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(450, t);
      o.frequency.exponentialRampToValueAtTime(250, t + 0.15);
      g.gain.setValueAtTime(0.2, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
      o.start(t); o.stop(t + 0.15);
    }

    function playFloorCeilingSound() {
      const t = audioCtx.currentTime;
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'triangle';
      o.frequency.setValueAtTime(200, t);
      o.frequency.exponentialRampToValueAtTime(80, t + 0.12);
      g.gain.setValueAtTime(0.18, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.12);
      o.start(t); o.stop(t + 0.12);
    }

    function playShootSound() {
      const t = audioCtx.currentTime;

      // Bass thump — the physical punch
      const o1 = audioCtx.createOscillator(), g1 = audioCtx.createGain();
      o1.type = 'sine';
      o1.frequency.setValueAtTime(180, t);
      o1.frequency.exponentialRampToValueAtTime(38, t + 0.2);
      g1.gain.setValueAtTime(0.75, t);
      g1.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      o1.connect(g1); g1.connect(audioCtx.destination);
      o1.start(t); o1.stop(t + 0.22);

      // Zap layer — descending sawtooth for the "shot" character
      const o2 = audioCtx.createOscillator(), g2 = audioCtx.createGain();
      o2.type = 'sawtooth';
      o2.frequency.setValueAtTime(820, t);
      o2.frequency.exponentialRampToValueAtTime(140, t + 0.14);
      g2.gain.setValueAtTime(0.35, t);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
      o2.connect(g2); g2.connect(audioCtx.destination);
      o2.start(t); o2.stop(t + 0.16);

      // Noise crack — sharp attack transient on the front edge
      const bufLen = Math.ceil(audioCtx.sampleRate * 0.055);
      const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource();
      noise.buffer = buf;
      const bpf = audioCtx.createBiquadFilter();
      bpf.type = 'bandpass'; bpf.frequency.value = 2200; bpf.Q.value = 0.9;
      const g3 = audioCtx.createGain();
      g3.gain.setValueAtTime(0.55, t);
      g3.gain.exponentialRampToValueAtTime(0.001, t + 0.055);
      noise.connect(bpf); bpf.connect(g3); g3.connect(audioCtx.destination);
      noise.start(t); noise.stop(t + 0.06);
    }

    function playBulletHitSound() {
      const t = audioCtx.currentTime;
      for (let i = 0; i < 3; i++) {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'square';
        o.frequency.setValueAtTime(800 - i * 200, t + i * 0.04);
        g.gain.setValueAtTime(0.12, t + i * 0.04);
        g.gain.exponentialRampToValueAtTime(0.01, t + i * 0.04 + 0.06);
        o.start(t + i * 0.04); o.stop(t + i * 0.04 + 0.06);
      }
    }

    // ─── Shield sound (continuous crackle while active) ──────────────────────
    let shieldSoundNodes = null;

    function startShieldSound() {
      if (shieldSoundNodes) return;
      const bufLen = audioCtx.sampleRate; // 1-second looping noise
      const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource();
      noise.buffer = buf; noise.loop = true;
      // Two bandpass layers for electrical texture
      const bpf1 = audioCtx.createBiquadFilter();
      bpf1.type = 'bandpass'; bpf1.frequency.value = 2500; bpf1.Q.value = 4;
      const bpf2 = audioCtx.createBiquadFilter();
      bpf2.type = 'bandpass'; bpf2.frequency.value = 900;  bpf2.Q.value = 2;
      const g1 = audioCtx.createGain(); g1.gain.value = 0.22;
      const g2 = audioCtx.createGain(); g2.gain.value = 0.12;
      const master = audioCtx.createGain(); master.gain.value = 1.0;
      // Square-wave LFO at 45 Hz — makes noise stutter into a crackle
      const lfo = audioCtx.createOscillator();
      lfo.type = 'square'; lfo.frequency.value = 45;
      const lfoG = audioCtx.createGain(); lfoG.gain.value = 0.22;
      lfo.connect(lfoG); lfoG.connect(master.gain);
      noise.connect(bpf1); bpf1.connect(g1); g1.connect(master);
      noise.connect(bpf2); bpf2.connect(g2); g2.connect(master);
      master.connect(audioCtx.destination);
      noise.start(); lfo.start();
      shieldSoundNodes = { noise, lfo };
    }

    function stopShieldSound() {
      if (!shieldSoundNodes) return;
      try { shieldSoundNodes.noise.stop(); shieldSoundNodes.lfo.stop(); } catch(e) {}
      shieldSoundNodes = null;
    }

    function playShieldBlockSound() {
      const t = audioCtx.currentTime;
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(300, t);
      o.frequency.linearRampToValueAtTime(600, t + 0.08);
      o.frequency.linearRampToValueAtTime(300, t + 0.16);
      g.gain.setValueAtTime(0.18, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.16);
      o.start(t); o.stop(t + 0.16);
    }

    // ─── Music (HTML5 Audio) ──────────────────────────────────────────────────
    const BASE = 'https://www.fesliyanstudios.com/download-link.php?src=i&id=';
    const tracks = [
      { name: 'Feels Good',             id: 417  },
      { name: 'Emotion',                id: 458  },
      { name: 'Silly Feet',             id: 394  },
      { name: 'Beating Heart',          id: 392  },
      { name: 'Lost In Dance',          id: 389  },
      { name: 'Dodging Lasers',         id: 2893 },
      { name: 'Bass Addict',            id: 2887 },
      { name: 'Paranoia Dance',         id: 2909 },
      { name: 'Give Me Back My Vibes',  id: 2901 },
      { name: 'Erosion',                id: 2741 },
      { name: 'Senses',                 id: 2711 },
      { name: 'Lily',                   id: 2697 },
      { name: 'Groovin',                id: 2677 },
      { name: 'Utopia',                 id: 2663 },
      { name: 'Slaps',                  id: 1002 },
      { name: 'ShakaLaka',              id: 582  },
      { name: 'Shake It Up',            id: 524  },
      { name: 'Let Go',                 id: 432  },
      { name: 'Pyromania Normal',       id: 2917 },
      { name: 'JPOP',                   id: 1726 },
      { name: '8 Bit Surf',             id: 568  },
      { name: 'Fight Club',             id: 391  },
      { name: 'Jump Around',            id: 396  },
      { name: 'Head Bang',              id: 409  },
      { name: 'Land of 8 Bits',         id: 288  },
    ];
    const frenzyTrackMeta = { name: 'Pyromania', id: 2921 };

    const audio = new Audio();
    audio.volume = 0.9;

    let useFrenzyMusic = false;
    let preFrenzyQueueIdx = 0;

    // Shuffled queue — cycles through every track before repeating any
    let trackQueue = [];
    let trackQueueIdx = 0;

    function buildTrackQueue(avoidIdx) {
      trackQueue = Array.from({ length: tracks.length }, (_, i) => i);
      for (let i = trackQueue.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [trackQueue[i], trackQueue[j]] = [trackQueue[j], trackQueue[i]];
      }
      if (avoidIdx !== undefined && trackQueue[0] === avoidIdx && trackQueue.length > 1)
        [trackQueue[0], trackQueue[1]] = [trackQueue[1], trackQueue[0]];
      trackQueueIdx = 0;
    }

    buildTrackQueue();
    let currentTrackIdx = trackQueue[0];

    audio.addEventListener('ended', () => {
      if (useFrenzyMusic) { audio.play().catch(() => {}); return; }
      const last = trackQueue[trackQueueIdx];
      trackQueueIdx++;
      if (trackQueueIdx >= trackQueue.length) buildTrackQueue(last);
      currentTrackIdx = trackQueue[trackQueueIdx];
      setTrackSrc();
      audio.play().catch(() => {});
    });

    function setTrackSrc() {
      const meta = useFrenzyMusic ? frenzyTrackMeta : tracks[currentTrackIdx];
      audio.src = BASE + meta.id;
      document.getElementById('now-playing').textContent = `♪ ${meta.name} ♪`;
    }

    function startMusic() {
      setTrackSrc();
      audio.addEventListener('loadedmetadata', function seekAndPlay() {
        audio.removeEventListener('loadedmetadata', seekAndPlay);
        const safeDuration = Math.max(0, audio.duration - 20);
        if (safeDuration > 0) audio.currentTime = Math.random() * safeDuration;
        audio.play().catch(() => {});
      });
    }

    function stopMusic() {
      audio.pause();
    }

    function syncMusicToState() {
      if (state === 'playing') {
        if (audio.paused) audio.play().catch(() => {});
      } else {
        audio.pause();
        stopShieldSound();
      }
    }

    // ─── State ────────────────────────────────────────────────────────────────
    let state = 'idle';
    let speedMultiplier = 1.0;
    let trailEnabled = false;
    let shieldIsOn      = false;
    let shieldEndTime   = 0;
    let shieldReadyTime = 0;
    const trailMaxLength = 100;
    let ballTrail = [];
    let trailActive = false, trailEndTime = 0, nextTrailTime = 0;
    let trailPausedRemaining = 0; // ms remaining when game was paused

    const keys = {};
    let lastPlayerShot = 0;
    let nextAIShot = 0;

    let playerBullets = [], aiBullets = [];
    let aiHoles = [], playerHoles = [];

    const player = { x: 20,          y: H / 2 - PADDLE_H / 2, score: 0 };
    const ai     = { x: W-20-PADDLE_W, y: H / 2 - PADDLE_H / 2, score: 0 };
    const ball   = { x: W/2, y: H/2, vx: 0, vy: 0, speed: 5 };

    let mouseY = H / 2;
    let winnerText = '';
    let winReason  = '';

    function setSpeed(v) {
      speedMultiplier = Math.min(2.0, Math.max(0.5, parseFloat(v.toFixed(1))));
    }

    // ─── Input ────────────────────────────────────────────────────────────────
    canvas.addEventListener('mousemove', e => {
      const r = canvas.getBoundingClientRect();
      mouseY = e.clientY - r.top;
    });

    canvas.addEventListener('click', () => {
      if (state === 'idle' || state === 'win') { audioCtx.resume(); resetGame(); state = 'playing'; startMusic(); }
    });

    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      const arrows = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'];
      if ([...arrows, ' '].includes(e.key)) e.preventDefault();

      if (e.key === ' ') {
        if (state === 'idle' || state === 'win') { audioCtx.resume(); resetGame(); state = 'playing'; startMusic(); }
        else if (state === 'playing') {
          state = 'paused';
          stopShieldSound(); shieldIsOn = false;
          if (trailActive) trailPausedRemaining = Math.max(0, trailEndTime - performance.now());
        }
        else if (state === 'paused') {
          state = 'playing';
          if (trailActive) trailEndTime = performance.now() + trailPausedRemaining;
        }
        syncMusicToState();
      }

      // Speed: + = faster, - = slower (keyboard and numpad)
      if (e.key === '+' || e.key === '=' || e.code === 'NumpadAdd')      setSpeed(speedMultiplier + 0.1);
      if (e.key === '-' || e.key === '_' || e.code === 'NumpadSubtract') setSpeed(speedMultiplier - 0.1);

    });

    document.addEventListener('keyup', e => { keys[e.key] = false; });


    // ─── Game logic ───────────────────────────────────────────────────────────
    function resetGame() {
      stopShieldSound(); shieldIsOn = false; shieldEndTime = 0; shieldReadyTime = 0;
      applyNextBackground();
      player.score = 0; ai.score = 0;
      document.getElementById('score-player').textContent = 0;
      document.getElementById('score-ai').textContent = 0;
      player.y = H / 2 - PADDLE_H / 2;
      ai.y     = H / 2 - PADDLE_H / 2;
      mouseY   = H / 2;
      playerBullets = []; aiBullets = [];
      aiHoles = []; playerHoles = [];
      trailActive = false; trailEnabled = false; ballTrail = [];
      useFrenzyMusic = false; buildTrackQueue(); currentTrackIdx = trackQueue[0];
      scheduleNextAIShot();
      scheduleNextTrail();
      launchBall();
    }

    function scheduleNextTrail() {
      nextTrailTime = performance.now() + 10000 + Math.random() * 30000;
    }

    function scheduleNextAIShot() {
      nextAIShot = performance.now() + AI_SHOT_MIN + Math.random() * (AI_SHOT_MAX - AI_SHOT_MIN);
    }

    function launchBall(towardAI = Math.random() < 0.5) {
      ball.x = W / 2; ball.y = H / 2; ball.speed = 5;
      const angle = Math.random() * 0.6 - 0.3;
      ball.vx = ball.speed * (towardAI ? 1 : -1) * Math.cos(angle);
      ball.vy = ball.speed * Math.sin(angle);
      ballTrail = [];
    }

    function addHole(holesArr, paddle, hitY) {
      if (holesArr.length >= MAX_HOLES) return;
      const relY = hitY - paddle.y;
      if (!holesArr.some(h => Math.abs(h - relY) < HOLE_SIZE + 2)) {
        holesArr.push(relY);
        if (holesArr.length >= MAX_HOLES) {
          // Paddle destroyed — other team wins
          const who = paddle === player ? 'CPU' : 'YOU';
          state = 'win';
          winnerText = who === 'YOU' ? 'YOU WIN!' : 'CPU WINS!';
          winReason  = who === 'YOU' ? 'CPU paddle destroyed by bullets' : 'Your paddle was shot to pieces';
          syncMusicToState();
        }
      }
    }

    function isHole(holesArr, paddle, testY) {
      return holesArr.some(relY => {
        const absY = paddle.y + relY;
        return testY >= absY - HOLE_SIZE / 2 && testY <= absY + HOLE_SIZE / 2;
      });
    }

    function updateTrail() {
      const now = performance.now();
      if (!trailActive && now >= nextTrailTime) {
        trailActive = true; trailEnabled = true;
        trailEndTime = now + TRAIL_DURATION;
        if (state === 'playing') {
          stopMusic();
          preFrenzyQueueIdx = trackQueueIdx;
          useFrenzyMusic = true;
          startMusic();
        }
      }
      if (trailActive && now >= trailEndTime) {
        trailActive = false; trailEnabled = false;
        ballTrail = []; scheduleNextTrail();
        if (state === 'playing') {
          stopMusic();
          useFrenzyMusic = false;
          trackQueueIdx = preFrenzyQueueIdx + 1;
          if (trackQueueIdx >= trackQueue.length) buildTrackQueue(trackQueue[preFrenzyQueueIdx]);
          currentTrackIdx = trackQueue[trackQueueIdx];
          startMusic();
        }
      }
    }

    function updatePlayer() {
      const kUp   = keys['ArrowUp']   || keys['8'] === true && false || e_num8();
      const kDown = keys['ArrowDown'] || e_num2();

      if (kUp || kDown) {
        if (kUp)   player.y -= KEY_PADDLE_SPEED;
        if (kDown) player.y += KEY_PADDLE_SPEED;
        // Sync mouseY so switching back to mouse is seamless
        mouseY = player.y + PADDLE_H / 2;
      } else {
        player.y = mouseY - PADDLE_H / 2;
      }
      player.y = Math.max(0, Math.min(H - PADDLE_H, player.y));
    }

    // Numpad key checks via e.code stored in keys-by-code map
    const codeKeys = {};
    document.addEventListener('keydown', e => { codeKeys[e.code] = true; });
    document.addEventListener('keyup',   e => { codeKeys[e.code] = false; });

    const e_num8 = () => codeKeys['Numpad8'];
    const e_num2 = () => codeKeys['Numpad2'];
    const e_num6 = () => codeKeys['Numpad6'];
    const e_num4 = () => codeKeys['Numpad4'];

    // Rewrite updatePlayer cleanly now that codeKeys is defined
    // (overwrite previous definition)
    window._updatePlayer = function() {
      const kUp   = keys['ArrowUp']   || codeKeys['Numpad8'];
      const kDown = keys['ArrowDown'] || codeKeys['Numpad2'];

      if (kUp || kDown) {
        if (kUp)   player.y -= KEY_PADDLE_SPEED;
        if (kDown) player.y += KEY_PADDLE_SPEED;
        mouseY = player.y + PADDLE_H / 2;
      } else {
        player.y = mouseY - PADDLE_H / 2;
      }
      player.y = Math.max(0, Math.min(H - PADDLE_H, player.y));
    };

    function updateAI() {
      const center = ai.y + PADDLE_H / 2;
      const diff = ball.y - center;
      const reaction = 0.08 + 0.04 * (Math.abs(ball.x - ai.x) / W);
      ai.y += diff * reaction;
      ai.y = Math.max(0, Math.min(H - PADDLE_H, ai.y));
    }

    function tryPlayerShoot() {
      if (!keys['ArrowRight'] && !codeKeys['Numpad6']) return;
      const now = performance.now();
      if (now - lastPlayerShot < SHOT_COOLDOWN) return;
      lastPlayerShot = now;
      playerBullets.push({ x: player.x + PADDLE_W + 2, y: player.y + PADDLE_H / 2 });
      playShootSound();
    }

    function tryAIShoot() {
      const now = performance.now();
      if (now < nextAIShot) return;
      scheduleNextAIShot();
      aiBullets.push({ x: ai.x - 2, y: ai.y + PADDLE_H / 2 });
      playShootSound();
    }

    function updateShieldState() {
      const now  = performance.now();
      const wants = keys['ArrowLeft'] || codeKeys['Numpad4'];
      const canActivate = now >= shieldReadyTime;
      const wasOn = shieldIsOn;
      // Arm a new activation window when key is first pressed and cooldown is done
      if (wants && canActivate && !wasOn) shieldEndTime = now + SHIELD_MAX_MS;
      shieldIsOn = wants && canActivate && now < shieldEndTime;
      if (wasOn && !shieldIsOn) { shieldReadyTime = now + SHIELD_RECHARGE_MS; stopShieldSound(); }
      if (!wasOn &&  shieldIsOn) startShieldSound();
    }

    function updateBullets() {
      const shield = shieldIsOn;
      const shieldX = player.x + PADDLE_W + 2;

      playerBullets = playerBullets.filter(b => {
        b.x += BULLET_SPEED * speedMultiplier;
        if (b.x > W) return false;
        const inX = b.x + BULLET_R >= ai.x && b.x - BULLET_R <= ai.x + PADDLE_W;
        const inY = b.y >= ai.y && b.y <= ai.y + PADDLE_H;
        if (inX && inY) {
          if (!isHole(aiHoles, ai, b.y)) { addHole(aiHoles, ai, b.y); playBulletHitSound(); }
          return false;
        }
        return true;
      });

      aiBullets = aiBullets.filter(b => {
        b.x -= BULLET_SPEED * speedMultiplier;
        if (b.x < 0) return false;
        if (shield) {
          const inSX = b.x - BULLET_R <= shieldX + 8 && b.x + BULLET_R >= shieldX;
          const inSY = b.y >= player.y && b.y <= player.y + PADDLE_H;
          if (inSX && inSY) { playShieldBlockSound(); return false; }
        }
        const inX = b.x - BULLET_R <= player.x + PADDLE_W && b.x + BULLET_R >= player.x;
        const inY = b.y >= player.y && b.y <= player.y + PADDLE_H;
        if (inX && inY) {
          if (!isHole(playerHoles, player, b.y)) { addHole(playerHoles, player, b.y); playBulletHitSound(); }
          return false;
        }
        return true;
      });
    }

    function collidesWithPaddle(paddle) {
      if (!(ball.x - BALL_R < paddle.x + PADDLE_W && ball.x + BALL_R > paddle.x &&
            ball.y + BALL_R > paddle.y && ball.y - BALL_R < paddle.y + PADDLE_H)) return false;
      const holes = paddle === player ? playerHoles : aiHoles;
      return !isHole(holes, paddle, ball.y);
    }

    function reflect(paddle) {
      const hitPos = (ball.y - paddle.y) / PADDLE_H;
      const angle  = (hitPos - 0.5) * Math.PI * 0.65;
      ball.speed = Math.min(ball.speed + 0.3, 14);
      const dir = paddle === player ? 1 : -1;
      ball.vx = dir * ball.speed * Math.cos(angle);
      ball.vy = ball.speed * Math.sin(angle);
    }

    function update() {
      if (state !== 'playing') return;

      updateTrail();
      window._updatePlayer();
      updateAI();
      updateShieldState();
      tryPlayerShoot();
      tryAIShoot();
      updateBullets();

      const frenzyMult = trailActive
        ? 1 + (TRAIL_SPEED_MULT - 1) * Math.min(1, (TRAIL_DURATION - (trailEndTime - performance.now())) / 5000)
        : 1;
      const spd = speedMultiplier * frenzyMult;
      ball.x += ball.vx * spd;
      ball.y += ball.vy * spd;

      if (trailEnabled) {
        ballTrail.push({ x: ball.x, y: ball.y });
        if (ballTrail.length > trailMaxLength) ballTrail.shift();
      }

      if (ball.y - BALL_R <= 0) { ball.y = BALL_R; ball.vy = Math.abs(ball.vy); playFloorCeilingSound(); }
      if (ball.y + BALL_R >= H) { ball.y = H - BALL_R; ball.vy = -Math.abs(ball.vy); playFloorCeilingSound(); }

      if (ball.vx < 0 && collidesWithPaddle(player)) {
        ball.x = player.x + PADDLE_W + BALL_R; reflect(player); playPaddleSound();
      }
      if (ball.vx > 0 && collidesWithPaddle(ai)) {
        ball.x = ai.x - BALL_R; reflect(ai); playPaddleSound();
      }

      if (ball.x - BALL_R < 0) {
        ai.score += trailActive ? TRAIL_SCORE_MULT : 1;
        document.getElementById('score-ai').textContent = ai.score;
        checkWin('CPU');
        if (state === 'playing') launchBall(false);
      } else if (ball.x + BALL_R > W) {
        player.score += trailActive ? TRAIL_SCORE_MULT : 1;
        document.getElementById('score-player').textContent = player.score;
        checkWin('YOU');
        if (state === 'playing') launchBall(true);
      }
    }

    function checkWin(who) {
      const s = who === 'YOU' ? player.score : ai.score;
      if (s >= WIN_SCORE) {
        state = 'win';
        winnerText = who === 'YOU' ? 'YOU WIN!' : 'CPU WINS!';
        winReason  = `First to ${WIN_SCORE} points`;
        syncMusicToState();
      }
    }

    // ─── Drawing ──────────────────────────────────────────────────────────────
    function drawDashedCenter() {
      ctx.setLineDash([10, 14]);
      ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
      ctx.setLineDash([]);
    }

    function drawPaddleWithHoles(paddle, color, holes) {
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.roundRect(paddle.x, paddle.y, PADDLE_W, PADDLE_H, 4); ctx.fill();
      ctx.fillStyle = '#111';
      holes.forEach(relY => {
        ctx.fillRect(paddle.x, paddle.y + relY - HOLE_SIZE / 2, PADDLE_W, HOLE_SIZE);
      });
    }

    function drawShieldCrackle() {
      if (!shieldIsOn) return;
      const faceX = player.x + PADDLE_W;
      const py = player.y, ph = PADDLE_H, px = player.x;
      ctx.save();

      // Glow halo along the opponent-facing edge
      const grd = ctx.createLinearGradient(faceX, 0, faceX + 20, 0);
      grd.addColorStop(0, 'rgba(80,200,255,0.55)');
      grd.addColorStop(1, 'rgba(80,200,255,0)');
      ctx.fillStyle = grd; ctx.shadowColor = '#4df'; ctx.shadowBlur = 22;
      ctx.fillRect(faceX, py - 6, 20, ph + 12);

      // Jagged lightning bolts projecting toward opponent
      const numBolts = 5 + Math.floor(Math.random() * 5);
      for (let i = 0; i < numBolts; i++) {
        const startY = py + Math.random() * ph;
        const reach  = 10 + Math.random() * 24;
        const segs   = 2 + Math.floor(Math.random() * 3);
        const bright = Math.random() < 0.55;
        ctx.strokeStyle = bright ? 'rgba(210,245,255,0.95)' : 'rgba(80,190,255,0.72)';
        ctx.lineWidth   = bright ? 1.6 : 0.8;
        ctx.shadowColor = '#4df'; ctx.shadowBlur = bright ? 12 : 5;
        ctx.beginPath(); ctx.moveTo(faceX, startY);
        let cx = faceX;
        for (let s = 0; s < segs; s++) {
          cx += reach / segs;
          ctx.lineTo(cx, startY + (Math.random() - 0.5) * 16);
        }
        ctx.stroke();
      }

      // Sparks — heavy on the face side, lighter on top/bottom/back edges
      const sparkCount = 7 + Math.floor(Math.random() * 7);
      for (let i = 0; i < sparkCount; i++) {
        const r = Math.random();
        let sx, sy;
        if (r < 0.55) {          // opponent-facing side
          sx = faceX + Math.random() * 20;
          sy = py + Math.random() * ph;
        } else if (r < 0.75) {   // top / bottom edges
          sx = px + Math.random() * (PADDLE_W + 8);
          sy = (Math.random() < 0.5 ? py : py + ph) + (Math.random() - 0.5) * 5;
        } else {                  // back edge (rare)
          sx = px + (Math.random() - 0.5) * 5;
          sy = py + Math.random() * ph;
        }
        ctx.fillStyle = Math.random() < 0.35 ? '#fff' : (Math.random() < 0.5 ? '#8ef' : '#acf');
        ctx.shadowColor = '#4df'; ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(sx, sy, 0.6 + Math.random() * 1.8, 0, Math.PI * 2);
        ctx.fill();
      }

      // Flickering edge lines along top and bottom of paddle
      ctx.lineWidth = 1; ctx.shadowBlur = 5;
      ctx.strokeStyle = `rgba(120,230,255,${0.35 + Math.random() * 0.45})`;
      ctx.beginPath(); ctx.moveTo(px, py);
      ctx.lineTo(faceX + 4 + Math.random() * 6, py + (Math.random() - 0.5) * 3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px, py + ph);
      ctx.lineTo(faceX + 4 + Math.random() * 6, py + ph + (Math.random() - 0.5) * 3); ctx.stroke();

      ctx.restore();
    }

    function drawBullets() {
      ctx.shadowBlur = 8;
      ctx.fillStyle = '#ff0'; ctx.shadowColor = '#ff0';
      playerBullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x,b.y,BULLET_R,0,Math.PI*2); ctx.fill(); });
      ctx.fillStyle = '#f60'; ctx.shadowColor = '#f60';
      aiBullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x,b.y,BULLET_R,0,Math.PI*2); ctx.fill(); });
      ctx.shadowBlur = 0;
    }

    function drawBall() {
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI*2); ctx.fill();
    }

    function drawTrail() {
      if (!trailEnabled || ballTrail.length === 0) return;
      const hues = ['#f00','#f80','#ff0','#0f0','#08f','#80f','#f0f'];
      for (let i = 0; i < ballTrail.length; i++) {
        const p = ballTrail[i];
        const progress = i / ballTrail.length;
        ctx.fillStyle = hues[Math.floor(progress * hues.length) % hues.length];
        ctx.globalAlpha = 0.65 * progress;
        ctx.beginPath(); ctx.arc(p.x, p.y, BALL_R * 0.7, 0, Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function updateFrenzyCounter() {
      const left  = document.getElementById('frenzy-left');
      const right = document.getElementById('frenzy-right');
      if (!trailActive || state === 'win' || state === 'idle') {
        left.style.visibility = 'hidden';
        right.style.visibility = 'hidden';
        left.innerHTML = '';
        right.innerHTML = '';
        return;
      }
      const remaining = state === 'paused' ? trailPausedRemaining : trailEndTime - performance.now();
      const secs = Math.max(0, Math.ceil(remaining / 1000));
      const hueShift = (performance.now() / 20) % 360;
      const rainbow = ['#f00','#f80','#ff0','#0f0','#08f','#a0f'];

      function colorize(str, offset) {
        return str.split('').map((ch, i) =>
          `<span style="color:${rainbow[(i + offset) % rainbow.length]}">${ch === ' ' ? '&nbsp;' : ch}</span>`
        ).join('');
      }

      const colorOffset = Math.floor(hueShift / 60);
      left.style.visibility = 'visible';
      left.innerHTML = colorize(`\u2605 RAINBOW FRENZY \u2605`, colorOffset);
      right.style.visibility = 'visible';
      right.innerHTML = colorize(`x${TRAIL_SCORE_MULT} SCORE \u00a0 x${TRAIL_SPEED_MULT} SPEED \u00a0 ${secs}s`, colorOffset + 3);
    }

    function drawOverlay(text, sub, reason) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 52px Courier New'; ctx.textAlign = 'center';
      ctx.fillText(text, W/2, H/2 - 20);
      if (reason) {
        ctx.font = 'italic 16px Courier New'; ctx.fillStyle = '#fc8';
        ctx.fillText(reason, W/2, H/2 + 18);
      }
      ctx.font = '18px Courier New'; ctx.fillStyle = '#aaa';
      ctx.fillText(sub, W/2, H/2 + (reason ? 50 : 34));
    }

    function draw() {
      if (trailActive) {
        const hue = (performance.now() / 18.75) % 360;
        bgA.style.filter = `hue-rotate(${hue}deg) saturate(1.4)`;
        bgB.style.filter = `hue-rotate(${hue}deg) saturate(1.4)`;
      } else {
        bgA.style.filter = '';
        bgB.style.filter = '';
      }
      frenzyOverlay.style.opacity = '0';
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = 'rgba(17,17,17,0.85)'; ctx.fillRect(0, 0, W, H);
      drawDashedCenter();
      drawPaddleWithHoles(player, '#4af', playerHoles);
      drawPaddleWithHoles(ai, '#f74', aiHoles);
      drawShieldCrackle();
      updateFrenzyCounter();
      if (state !== 'idle') { drawTrail(); drawBall(); drawBullets(); }
      if (state === 'idle')   drawOverlay('SPACE PONG', 'SPACE or Click to start');
      else if (state === 'paused') drawOverlay('PAUSED', 'Press SPACE to resume');
      else if (state === 'win')    drawOverlay(winnerText, 'SPACE or Click to play again', winReason);
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
  </script>
</body>
</html>
