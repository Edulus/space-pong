<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON PONG</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a12;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    cursor: none;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
  }

  #ui-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  #score-display {
    position: fixed;
    top: 30px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 80px;
    z-index: 20;
    pointer-events: none;
  }

  .score {
    font-family: 'Orbitron', monospace;
    font-size: 48px;
    font-weight: 900;
    letter-spacing: 4px;
  }

  .score-p1 {
    color: #ff2d7b;
    text-shadow: 0 0 20px #ff2d7b88, 0 0 40px #ff2d7b44, 0 0 80px #ff2d7b22;
  }

  .score-p2 {
    color: #00f0ff;
    text-shadow: 0 0 20px #00f0ff88, 0 0 40px #00f0ff44, 0 0 80px #00f0ff22;
  }

  .score-divider {
    color: #ffffff33;
    font-size: 36px;
    align-self: center;
  }

  #start-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 30;
    background: radial-gradient(ellipse at center, #0a0a1288 0%, #0a0a12 70%);
    pointer-events: all;
  }

  #start-screen h1 {
    font-family: 'Orbitron', monospace;
    font-size: 72px;
    font-weight: 900;
    background: linear-gradient(135deg, #ff2d7b, #ff6b35, #ffdd00, #00f0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 12px;
    margin-bottom: 10px;
    animation: titlePulse 2s ease-in-out infinite;
  }

  #start-screen .subtitle {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    color: #ffffff55;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 50px;
  }

  #start-screen .prompt {
    font-family: 'Rajdhani', sans-serif;
    font-size: 20px;
    color: #ffffff88;
    letter-spacing: 4px;
    animation: blink 1.5s ease-in-out infinite;
  }

  .controls-info {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    color: #ffffff44;
    letter-spacing: 2px;
    margin-top: 30px;
    text-align: center;
    line-height: 2;
  }

  .controls-info span.key {
    display: inline-block;
    padding: 2px 10px;
    border: 1px solid #ffffff33;
    border-radius: 4px;
    color: #ffffff77;
    margin: 0 4px;
  }

  @keyframes titlePulse {
    0%, 100% { filter: drop-shadow(0 0 30px #ff2d7b44) drop-shadow(0 0 60px #00f0ff22); }
    50% { filter: drop-shadow(0 0 50px #ff2d7b66) drop-shadow(0 0 80px #00f0ff44); }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  #rally-counter {
    position: fixed;
    bottom: 30px;
    width: 100%;
    text-align: center;
    z-index: 20;
    pointer-events: none;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    color: #ffffff33;
    letter-spacing: 6px;
    text-transform: uppercase;
    transition: color 0.3s;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="score-display" class="hidden">
  <span class="score score-p1" id="s1">0</span>
  <span class="score-divider">:</span>
  <span class="score score-p2" id="s2">0</span>
</div>

<div id="rally-counter" class="hidden">RALLY <span id="rally-num">0</span></div>

<div id="start-screen">
  <h1>NEON PONG</h1>
  <div class="subtitle">spin physics · particle chaos</div>
  <div class="prompt">PRESS ANY KEY OR TAP TO START</div>
  <div class="controls-info">
    <span class="key">W</span> <span class="key">S</span> Player 1 &nbsp;&nbsp;&nbsp;
    <span class="key">↑</span> <span class="key">↓</span> Player 2<br>
    Curved paddles add spin to the ball
  </div>
</div>

<script>
// =============================================================================
// CANVAS SETUP
// =============================================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// =============================================================================
// RESPONSIVE SIZING
// Resizes the canvas to fill the full browser window on load and resize events.
// =============================================================================
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// =============================================================================
// COLOR CONSTANTS
// Player 1 = hot pink, Player 2 = cyan, Ball = white (shifts with rally heat)
// =============================================================================
const P1_COLOR = '#ff2d7b';
const P2_COLOR = '#00f0ff';
const BALL_COLOR = '#ffffff';

// =============================================================================
// GAME STATE
// Tracks whether the game has started, player scores, consecutive rally hits,
// and screen shake intensity/direction for camera effects.
// =============================================================================
let gameStarted = false;
let scores = [0, 0];
let rallyCount = 0;       // consecutive hits without scoring — drives visual intensity
let screenShake = 0;       // current shake magnitude (decays each frame)
let screenShakeAngle = 0;  // random direction for shake offset

// =============================================================================
// PARTICLE SYSTEM
// Two arrays: `particles` for hit/score explosions, `trails` for ball afterimages.
// Each particle has position, velocity, color, lifetime, and size.
// Particles fade out and shrink as their life decreases.
// =============================================================================
const particles = [];
const trails = [];

class Particle {
  constructor(x, y, color, vx, vy, life, size) {
    this.x = x; this.y = y;
    this.color = color;
    this.vx = vx; this.vy = vy;
    this.life = life;       // frames remaining
    this.maxLife = life;    // initial lifetime (used for alpha calculation)
    this.size = size || 3;
  }
  // Move the particle, apply friction (0.98), decrement life
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.98;  // friction — particles decelerate over time
    this.vy *= 0.98;
    this.life--;
  }
  // Draw a glowing circle that fades and shrinks with remaining life
  draw() {
    const alpha = this.life / this.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

// Spawn a burst of particles at (x,y) — used on paddle hits and wall bounces.
// `count` scales with rally length so hits feel more intense over time.
function spawnHitParticles(x, y, color, count = 20) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 6;
    particles.push(new Particle(
      x, y, color,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      20 + Math.random() * 30,
      1 + Math.random() * 3
    ));
  }
}

// Spawn a large explosion when a point is scored — 60 particles, bigger and faster.
function spawnScoreExplosion(x, y, color) {
  for (let i = 0; i < 60; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 10;
    particles.push(new Particle(
      x, y, color,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      40 + Math.random() * 40,
      2 + Math.random() * 4
    ));
  }
}

// =============================================================================
// BALL OBJECT
// Tracks position, velocity, spin (applied as curve each frame), and radius.
// reset() centers the ball and launches it at a slight random angle.
// =============================================================================
const ball = {
  x: 0, y: 0,
  vx: 0, vy: 0,
  spin: 0,          // spin value — positive = curves downward, negative = curves upward
  radius: 8,
  speed: 6,
  baseSpeed: 6,     // initial launch speed (ball accelerates on each paddle hit)
  reset() {
    this.x = canvas.width / 2;
    this.y = canvas.height / 2;
    this.spin = 0;
    const angle = (Math.random() - 0.5) * 0.8;  // slight vertical variance
    const dir = Math.random() > 0.5 ? 1 : -1;   // random left/right
    this.vx = Math.cos(angle) * this.baseSpeed * dir;
    this.vy = Math.sin(angle) * this.baseSpeed;
    this.speed = this.baseSpeed;
  }
};

// =============================================================================
// PADDLE CONFIGURATION & OBJECTS
// PADDLE_CURVE controls how much spin the curved paddle surface imparts.
// Each paddle tracks x, y, vertical velocity (vy), and color.
// =============================================================================
const PADDLE_W = 14;
const PADDLE_H = 110;
const PADDLE_CURVE = 0.35; // spin multiplier — higher = more curve on off-center hits
const PADDLE_SPEED = 7;

const paddles = [
  { x: 40, y: 0, vy: 0, color: P1_COLOR, upKey: false, downKey: false },
  { x: 0, y: 0, vy: 0, color: P2_COLOR, upKey: false, downKey: false },
];

// Center both paddles vertically and position them at their respective edges
function resetPaddles() {
  paddles[0].x = 40;
  paddles[0].y = canvas.height / 2 - PADDLE_H / 2;
  paddles[1].x = canvas.width - 40 - PADDLE_W;
  paddles[1].y = canvas.height / 2 - PADDLE_H / 2;
}

// =============================================================================
// INPUT HANDLING
// Keyboard: tracks all pressed keys in a dictionary. Any key starts the game.
// Touch: drag vertically to move both paddles (mobile support).
// =============================================================================
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (!gameStarted) startGame();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch support — tracks vertical drag delta and applies to both paddles
let touchY = null;
window.addEventListener('touchstart', e => {
  if (!gameStarted) { startGame(); return; }
  touchY = e.touches[0].clientY;
});
window.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches[0]) {
    const newY = e.touches[0].clientY;
    if (touchY !== null) {
      const delta = newY - touchY;
      paddles[0].y += delta;
      paddles[1].y += delta;
    }
    touchY = newY;
  }
}, { passive: false });
window.addEventListener('touchend', () => { touchY = null; });

// =============================================================================
// GAME INITIALIZATION
// Hides the start screen, shows score UI, resets all game objects to defaults.
// =============================================================================
function startGame() {
  gameStarted = true;
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('score-display').classList.remove('hidden');
  document.getElementById('rally-counter').classList.remove('hidden');
  resetPaddles();
  ball.reset();
  scores = [0, 0];
  rallyCount = 0;
  updateScoreDisplay();
}

// Sync the DOM score and rally counter elements with current game state
function updateScoreDisplay() {
  document.getElementById('s1').textContent = scores[0];
  document.getElementById('s2').textContent = scores[1];
  document.getElementById('rally-num').textContent = rallyCount;
}

// =============================================================================
// BACKGROUND RENDERING
// Draws a dark radial gradient base, a subtle grid overlay, a dashed center
// line, and a center circle — all very low opacity for atmosphere.
// =============================================================================
function drawBackground() {
  // Radial gradient — darker at edges, slightly lighter at center
  const grad = ctx.createRadialGradient(
    canvas.width / 2, canvas.height / 2, 0,
    canvas.width / 2, canvas.height / 2, canvas.width * 0.7
  );
  grad.addColorStop(0, '#12122a');
  grad.addColorStop(1, '#0a0a12');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = '#ffffff08';
  ctx.lineWidth = 1;
  const gridSize = 50;
  for (let x = 0; x < canvas.width; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }

  // Center line
  ctx.setLineDash([12, 18]);
  ctx.strokeStyle = '#ffffff15';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(canvas.width / 2, 0);
  ctx.lineTo(canvas.width / 2, canvas.height);
  ctx.stroke();
  ctx.setLineDash([]);

  // Center circle
  ctx.strokeStyle = '#ffffff0a';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(canvas.width / 2, canvas.height / 2, 80, 0, Math.PI * 2);
  ctx.stroke();
}

// =============================================================================
// PADDLE RENDERING (CURVED)
// Draws each paddle as a curved shape using quadratic Bézier curves.
// The curve direction flips per side (P1 curves left, P2 curves right).
// A neon glow (shadowBlur) and inner highlight line complete the look.
// =============================================================================
function drawPaddle(p) {
  // Outer neon glow effect
  ctx.shadowColor = p.color;
  ctx.shadowBlur = 25;

  // Calculate curve direction — P1 paddle curves inward (left), P2 curves inward (right)
  const cx = p === paddles[0] ? p.x + PADDLE_W + 8 : p.x - 8;
  const curve = p === paddles[0] ? -12 : 12;

  ctx.fillStyle = p.color;
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  ctx.quadraticCurveTo(p.x + PADDLE_W / 2 + curve, p.y + PADDLE_H / 2, p.x, p.y + PADDLE_H);
  ctx.lineTo(p.x + PADDLE_W, p.y + PADDLE_H);
  ctx.quadraticCurveTo(p.x + PADDLE_W / 2 + curve, p.y + PADDLE_H / 2, p.x + PADDLE_W, p.y);
  ctx.closePath();
  ctx.fill();

  // Inner glow line
  ctx.strokeStyle = '#ffffff88';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.quadraticCurveTo(p.x + PADDLE_W / 2 + curve, p.y + PADDLE_H / 2, p.x + (p === paddles[0] ? 0 : PADDLE_W), p.y + PADDLE_H);
  ctx.stroke();

  ctx.shadowBlur = 0;
}

// =============================================================================
// BALL RENDERING
// Three layers: (1) trail afterimages, (2) main ball, (3) spin indicator.
// 
// TRAIL: Records ball position each frame into `trails[]`. Each trail dot
// fades and shrinks over 15 frames. Color shifts from white to orange/red
// based on `rallyHeat` (0-1 ratio of rallyCount/15).
//
// BALL COLOR: Shifts from white → orange → red as rally count increases,
// making long rallies feel visually hotter. Glow intensity also scales.
//
// SPIN INDICATOR: When the ball has significant spin, a rotating line is
// drawn through its center. Rotation speed = spin value × time.
// =============================================================================
function drawBall() {
  // --- Trail afterimages ---
  // Push current position as a new trail dot
  trails.push({ x: ball.x, y: ball.y, life: 15, maxLife: 15 });

  // Draw trails
  for (let i = trails.length - 1; i >= 0; i--) {
    const t = trails[i];
    const alpha = (t.life / t.maxLife) * 0.4;
    const rallyHeat = Math.min(rallyCount / 15, 1);
    const r = Math.round(255 - rallyHeat * 210);
    const g = Math.round(255 - rallyHeat * 200);
    const b = Math.round(255 - rallyHeat * 130);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, ball.radius * (t.life / t.maxLife), 0, Math.PI * 2);
    ctx.fill();
    t.life--;
    if (t.life <= 0) trails.splice(i, 1);
  }
  ctx.globalAlpha = 1;

  // Ball color shifts with rally heat
  const rallyHeat = Math.min(rallyCount / 15, 1);
  const ballR = Math.round(255);
  const ballG = Math.round(255 - rallyHeat * 200);
  const ballB = Math.round(255 - rallyHeat * 180);
  const currentBallColor = `rgb(${ballR},${ballG},${ballB})`;

  // Main ball
  ctx.shadowColor = currentBallColor;
  ctx.shadowBlur = 20 + rallyHeat * 20;
  ctx.fillStyle = currentBallColor;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fill();

  // Spin indicator — rotating line on ball
  if (Math.abs(ball.spin) > 0.1) {
    const spinAngle = performance.now() * 0.01 * ball.spin;
    ctx.strokeStyle = '#ffffff88';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(
      ball.x + Math.cos(spinAngle) * ball.radius * 0.7,
      ball.y + Math.sin(spinAngle) * ball.radius * 0.7
    );
    ctx.lineTo(
      ball.x - Math.cos(spinAngle) * ball.radius * 0.7,
      ball.y - Math.sin(spinAngle) * ball.radius * 0.7
    );
    ctx.stroke();
  }

  ctx.shadowBlur = 0;
}

// =============================================================================
// BALL PHYSICS & COLLISION
// 
// SPIN PHYSICS: Each frame, spin is applied as a vertical force (vy += spin * 0.15),
// causing the ball to curve mid-flight. Spin decays by 0.5% per frame (× 0.995).
//
// WALL BOUNCE: Ball reflects off top/bottom walls with minor particle sparks.
//
// PADDLE COLLISION: On hit, calculates `hitPos` (-1 to 1) based on where on
// the paddle face the ball struck. This drives two things:
//   1. SPIN: hitPos × PADDLE_CURVE × 8, plus paddle's own velocity × 0.3
//   2. ANGLE: hitPos maps to a reflection angle (±60°)
// Ball speed increases 5% per hit, capped at 18px/frame.
// Spawns particles scaled to rally count and triggers screen shake.
//
// SCORING: When ball exits left/right bounds, opponent scores. Triggers a
// large particle explosion, heavy screen shake, and rally reset.
// =============================================================================
function updateBall() {
  // Apply spin as a continuous vertical force — this is what curves the ball
  ball.vy += ball.spin * 0.15;
  ball.spin *= 0.995; // spin decays slowly each frame

  ball.x += ball.vx;
  ball.y += ball.vy;

  // Top/bottom bounce
  if (ball.y - ball.radius < 0) {
    ball.y = ball.radius;
    ball.vy *= -1;
    spawnHitParticles(ball.x, ball.y, '#ffffff55', 8);
  }
  if (ball.y + ball.radius > canvas.height) {
    ball.y = canvas.height - ball.radius;
    ball.vy *= -1;
    spawnHitParticles(ball.x, ball.y, '#ffffff55', 8);
  }

  // --- Paddle collisions ---
  // Check both paddles using AABB (axis-aligned bounding box) detection
  for (let i = 0; i < 2; i++) {
    const p = paddles[i];
    const paddleLeft = p.x;
    const paddleRight = p.x + PADDLE_W;
    const paddleTop = p.y;
    const paddleBottom = p.y + PADDLE_H;

    if (
      ball.x + ball.radius > paddleLeft &&
      ball.x - ball.radius < paddleRight &&
      ball.y + ball.radius > paddleTop &&
      ball.y - ball.radius < paddleBottom
    ) {
      // Where on paddle did it hit? -1 to 1
      const hitPos = ((ball.y - p.y) / PADDLE_H - 0.5) * 2;

      // Spin from curved paddle: depends on hit position
      ball.spin = hitPos * PADDLE_CURVE * 8;

      // Also add paddle velocity to spin
      ball.spin += p.vy * 0.3;

      // Reflect
      ball.vx *= -1;

      // Adjust angle based on hit position
      const angle = hitPos * Math.PI / 3;
      const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
      const newSpeed = Math.min(speed * 1.05, 18); // accelerate, cap at 18
      ball.vx = (i === 0 ? 1 : -1) * Math.cos(angle) * newSpeed;
      ball.vy = Math.sin(angle) * newSpeed;

      // Push ball out of paddle
      ball.x = i === 0 ? paddleRight + ball.radius : paddleLeft - ball.radius;

      rallyCount++;
      updateScoreDisplay();

      // Effects
      spawnHitParticles(ball.x, ball.y, p.color, 15 + rallyCount * 2);
      screenShake = 4 + Math.min(rallyCount, 10);
      screenShakeAngle = Math.random() * Math.PI * 2;
    }
  }

  // --- Scoring ---
  // Ball exiting left edge = P2 scores, right edge = P1 scores.
  // Triggers explosion, heavy shake, rally reset, and ball re-launch.
  if (ball.x < -30) {
    scores[1]++;
    spawnScoreExplosion(0, ball.y, P2_COLOR);
    screenShake = 20;
    rallyCount = 0;
    updateScoreDisplay();
    ball.reset();
  }
  if (ball.x > canvas.width + 30) {
    scores[0]++;
    spawnScoreExplosion(canvas.width, ball.y, P1_COLOR);
    screenShake = 20;
    rallyCount = 0;
    updateScoreDisplay();
    ball.reset();
  }
}

// =============================================================================
// PADDLE MOVEMENT
// Reads keyboard state to set paddle velocity. When no key is pressed,
// velocity decays (× 0.8) for a smooth stop instead of instant halt.
// Paddles are clamped to screen bounds. P2's x is recalculated on each
// frame to stay correct after window resizes.
// =============================================================================
function updatePaddles() {
  // P1 controls: W (up) / S (down)
  if (keys['w'] || keys['W']) paddles[0].vy = -PADDLE_SPEED;
  else if (keys['s'] || keys['S']) paddles[0].vy = PADDLE_SPEED;
  else paddles[0].vy *= 0.8;

  // P2 controls: Arrow Up / Arrow Down
  if (keys['ArrowUp']) paddles[1].vy = -PADDLE_SPEED;
  else if (keys['ArrowDown']) paddles[1].vy = PADDLE_SPEED;
  else paddles[1].vy *= 0.8;

  for (const p of paddles) {
    p.y += p.vy;
    p.y = Math.max(0, Math.min(canvas.height - PADDLE_H, p.y));
  }

  // Keep P2 x correct on resize
  paddles[1].x = canvas.width - 40 - PADDLE_W;
}

// =============================================================================
// MAIN GAME LOOP
// Runs every frame via requestAnimationFrame. Order of operations:
//   1. Apply screen shake (translate canvas context)
//   2. Draw background
//   3. If game started: update paddles → update ball → draw paddles → draw ball
//      If not started: spawn ambient floating particles for the title screen
//   4. Update and draw all active particles
//   5. Draw rally heat border glow (kicks in after 5 consecutive hits)
//   6. Restore canvas context (undo screen shake translation)
// =============================================================================
function gameLoop() {
  requestAnimationFrame(gameLoop);

  ctx.save();

  // --- Screen shake ---
  // Translates the entire canvas by a random offset based on shake magnitude.
  // Shake decays by 15% per frame. Triggered by paddle hits (small) and scores (large).
  if (screenShake > 0) {
    const shakeX = Math.cos(screenShakeAngle) * screenShake * (Math.random() - 0.5) * 2;
    const shakeY = Math.sin(screenShakeAngle) * screenShake * (Math.random() - 0.5) * 2;
    ctx.translate(shakeX, shakeY);
    screenShake *= 0.85;
    if (screenShake < 0.5) screenShake = 0;
  }

  drawBackground();

  if (!gameStarted) {
    // Ambient particles on start screen
    if (Math.random() < 0.1) {
      particles.push(new Particle(
        Math.random() * canvas.width,
        Math.random() * canvas.height,
        Math.random() > 0.5 ? P1_COLOR + '44' : P2_COLOR + '44',
        (Math.random() - 0.5) * 0.5,
        (Math.random() - 0.5) * 0.5,
        60 + Math.random() * 60,
        1 + Math.random() * 2
      ));
    }
  } else {
    updatePaddles();
    updateBall();
    drawPaddle(paddles[0]);
    drawPaddle(paddles[1]);
    drawBall();
  }

  // --- Update and draw all active particles ---
  // Iterates backward so splice doesn't skip elements when removing dead particles
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw();
    if (particles[i].life <= 0) particles.splice(i, 1);
  }

  // --- Rally heat border glow ---
  // After 5+ consecutive hits, a pink radial glow creeps in from the screen
  // edges. Intensity scales from 0 to full over 20 additional hits.
  if (gameStarted && rallyCount > 5) {
    const intensity = Math.min((rallyCount - 5) / 20, 1);
    const grad = ctx.createRadialGradient(
      canvas.width / 2, canvas.height / 2, canvas.width * 0.3,
      canvas.width / 2, canvas.height / 2, canvas.width * 0.7
    );
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(1, `rgba(255, 45, 123, ${intensity * 0.15})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  ctx.restore();
}

gameLoop();
</script>
</body>
</html>
